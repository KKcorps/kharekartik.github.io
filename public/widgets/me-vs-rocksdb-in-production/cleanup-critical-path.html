<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleanup Critical Path</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--w-accent); margin-bottom: 6px;
  }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  .stats {
    display: flex; gap: 20px; font-size: 11px; color: #666; margin-top: 14px; flex-wrap: wrap;
  }
  .stats span { color: var(--w-accent); }
  .stats .warn { color: #e6a64a; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// cleanup critical path</div>
  <div class="widget-subtitle">toggle placement and step through where expensive RocksDB cleanup runs</div>

  <svg id="main-svg" viewBox="0 0 720 410" xmlns="http://www.w3.org/2000/svg">
    <text x="40" y="18" fill="#666" font-size="10" font-family="IBM Plex Mono">THE SAME CLEANUP WORK FEELS DIFFERENT DEPENDING ON WHICH THREAD PAYS FOR IT</text>
    <g id="content"></g>
    <rect x="40" y="350" width="640" height="45" rx="3" fill="none" stroke="#222" stroke-width="1" id="status-panel"/>
    <text x="360" y="374" text-anchor="middle" fill="#888" font-size="11"
          font-family="IBM Plex Mono" id="status-text">step through the cleanup flow</text>
    <text x="360" y="388" text-anchor="middle" fill="#555" font-size="9"
          font-family="IBM Plex Mono" id="status-sub">the critical thread should do state work, not millions of get/delete calls</text>
  </svg>

  <div class="controls">
    <button id="btn-sync" class="active">sync cleanup</button>
    <button id="btn-deferred">deferred manager</button>
    <button id="btn-prev">prev</button>
    <button id="btn-next">next</button>
    <button id="btn-reset">reset</button>
  </div>
  <div class="stats">
    <div>critical thread occupied: <span id="stat-critical">0</span></div>
    <div>writes waiting: <span id="stat-writes">low</span></div>
  </div>
</div>
<script>
// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

const content = document.getElementById('content');
const statusPanel = document.getElementById('status-panel');
const statusText = document.getElementById('status-text');
const statusSub = document.getElementById('status-sub');
const statCritical = document.getElementById('stat-critical');
const statWrites = document.getElementById('stat-writes');
const btnSync = document.getElementById('btn-sync');
const btnDeferred = document.getElementById('btn-deferred');

let mode = 'sync';
let step = 0;

const SYNC_STEPS = [
  { lane: 'critical', title: 'remove shard', detail: 'state starts' },
  { lane: 'critical', title: 'scan records', detail: 'many keys' },
  { lane: 'critical', title: 'rebuild key', detail: 'CPU on control' },
  { lane: 'critical', title: 'get + delete', detail: 'writes wait' },
  { lane: 'critical', title: 'release locks', detail: 'late release' },
  { lane: 'critical', title: 'writes resume', detail: 'after debt' }
];

const DEFERRED_STEPS = [
  { lane: 'critical', title: 'remove shard', detail: 'minimal sync' },
  { lane: 'critical', title: 'queue job', detail: 'audited handoff' },
  { lane: 'critical', title: 'release locks', detail: 'writes resume' },
  { lane: 'worker', title: 'scan records', detail: 'paced worker' },
  { lane: 'worker', title: 'get + delete', detail: 'cleanup manager' },
  { lane: 'worker', title: 'mark done', detail: 'state catches up' }
];

function makeSvgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [key, value] of Object.entries(attrs)) el.setAttribute(key, value);
  return el;
}

function addText(parent, x, y, text, opts = {}) {
  const el = makeSvgEl('text', {
    x, y, fill: opts.fill || '#888', 'font-size': opts.size || '11',
    'font-family': 'IBM Plex Mono', 'text-anchor': opts.anchor || 'start'
  });
  el.textContent = text;
  parent.appendChild(el);
  return el;
}

function colorFor(index, lane, currentLane) {
  if (index < step) return ACCENT_DIM;
  if (index === step) return lane === 'worker' ? '#4a9ee6' : mode === 'sync' && currentLane === 'critical' && step > 0 && step < 4 ? '#e6a64a' : ACCENT;
  return '#333';
}

function fillFor(index, lane) {
  if (index < step) return ACCENT_FILL_DARK;
  if (index === step && lane === 'worker') return '#0a101a';
  if (index === step) return ACCENT_FILL;
  return 'none';
}

function drawLane(label, y, color) {
  addText(content, 42, y - 16, label, { fill: color, size: '10' });
  content.appendChild(makeSvgEl('line', {
    x1: 40, y1: y, x2: 680, y2: y, stroke: '#222', 'stroke-width': 1
  }));
}

function drawStepBox(item, index, x, y) {
  const currentLane = item.lane;
  const stroke = colorFor(index, item.lane, currentLane);
  const fill = fillFor(index, item.lane);
  content.appendChild(makeSvgEl('rect', {
    x, y, width: 104, height: 58, rx: 3, fill, stroke,
    'stroke-width': index === step ? 1.5 : 1
  }));
  addText(content, x + 52, y + 21, item.title, {
    fill: index === step ? stroke : index < step ? ACCENT_MID : '#555', size: '9', anchor: 'middle'
  });
  addText(content, x + 52, y + 40, item.detail, {
    fill: index <= step ? '#888' : '#444', size: '8', anchor: 'middle'
  });
}

function render() {
  content.innerHTML = '';
  btnSync.classList.toggle('active', mode === 'sync');
  btnDeferred.classList.toggle('active', mode === 'deferred');
  const steps = mode === 'sync' ? SYNC_STEPS : DEFERRED_STEPS;
  drawLane('CRITICAL STATE TRANSITION THREAD', 78, mode === 'sync' ? '#e6a64a' : ACCENT);
  drawLane('DEDICATED ROCKSDB CLEANUP MANAGER', 220, mode === 'sync' ? '#444' : '#4a9ee6');

  steps.forEach((item, index) => {
    const x = 48 + index * 106;
    const y = item.lane === 'critical' ? 96 : 238;
    drawStepBox(item, index, x, y);
    if (index < steps.length - 1) {
      const nextY = steps[index + 1].lane === 'critical' ? 125 : 267;
      content.appendChild(makeSvgEl('line', {
        x1: x + 104, y1: y + 29, x2: x + 106, y2: nextY,
        stroke: index < step ? ACCENT_DIM : '#333', 'stroke-width': 1
      }));
    }
  });

  const criticalOccupied = mode === 'sync' ? Math.min(step + 1, 5) : Math.min(step + 1, 3);
  const writesWaiting = mode === 'sync' && step > 0 && step < 5 ? 'rising' : mode === 'deferred' && step > 2 ? 'low' : 'some';
  statCritical.textContent = `${criticalOccupied} steps`;
  statWrites.textContent = writesWaiting;
  statWrites.className = writesWaiting === 'rising' ? 'warn' : '';

  const current = steps[step];
  if (mode === 'sync' && step > 0 && step < 4) {
    statusText.textContent = `${current.title} is still running on the thread that should move state forward`;
    statusSub.textContent = 'cleanup is now part of the foreground control path';
    statusText.setAttribute('fill', '#e6a64a');
    statusPanel.setAttribute('stroke', '#e6a64a');
  } else if (mode === 'deferred' && step >= 3) {
    statusText.textContent = `${current.title} still costs work, but it no longer blocks the state transition`;
    statusSub.textContent = 'the tradeoff is temporary garbage, not stalled writes';
    statusText.setAttribute('fill', '#4a9ee6');
    statusPanel.setAttribute('stroke', '#4a9ee6');
  } else {
    statusText.textContent = current.title;
    statusSub.textContent = current.detail;
    statusText.setAttribute('fill', ACCENT);
    statusPanel.setAttribute('stroke', ACCENT_DIM);
  }
}

btnSync.addEventListener('click', () => {
  mode = 'sync';
  step = 0;
  render();
});

btnDeferred.addEventListener('click', () => {
  mode = 'deferred';
  step = 0;
  render();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  step = Math.max(0, step - 1);
  render();
});

document.getElementById('btn-next').addEventListener('click', () => {
  step = Math.min(5, step + 1);
  render();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  step = 0;
  render();
});

render();
</script>
</body>
</html>
