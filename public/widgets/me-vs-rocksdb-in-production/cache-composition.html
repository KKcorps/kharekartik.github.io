<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cache Composition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--w-accent); margin-bottom: 6px;
  }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  .slider-wrap { display: flex; gap: 8px; align-items: center; color: #666; font-size: 11px; flex: 1 1 220px; min-width: 220px; }
  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 4px; background: #222;
    border-radius: 2px; outline: none; margin: 0 4px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; background: var(--w-accent);
    border-radius: 50%; cursor: pointer; border: 2px solid #0a0a0a;
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; background: var(--w-accent);
    border-radius: 50%; cursor: pointer; border: 2px solid #0a0a0a;
  }
  .legend {
    display: flex; gap: 14px; font-size: 11px; color: #666; margin-top: 14px; flex-wrap: wrap;
  }
  .legend-dot { display: inline-block; width: 8px; height: 8px; margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// block cache composition</div>
  <div class="widget-subtitle">change file count and cache mode to see what is actually resident</div>

  <svg id="main-svg" viewBox="0 0 720 390" xmlns="http://www.w3.org/2000/svg">
    <text x="40" y="18" fill="#666" font-size="10" font-family="IBM Plex Mono">A POINT LOOKUP HAS TO PASS THROUGH METADATA BEFORE IT GETS DATA</text>
    <g id="content"></g>
    <rect x="40" y="330" width="640" height="45" rx="3" fill="none" stroke="#222" stroke-width="1" id="status-panel"/>
    <text x="360" y="354" text-anchor="middle" fill="#888" font-size="11"
          font-family="IBM Plex Mono" id="status-text">cache is large enough and mostly available for data blocks</text>
    <text x="360" y="368" text-anchor="middle" fill="#555" font-size="9"
          font-family="IBM Plex Mono" id="status-sub">filters and indexes help reads, but they also spend cache</text>
  </svg>

  <div class="controls">
    <button id="btn-balanced" class="active">balanced</button>
    <button id="btn-fragmented">metadata heavy</button>
    <button id="btn-bug">8MB effective cache</button>
    <div class="slider-wrap">sst files <input id="files" type="range" min="10" max="180" value="36"></div>
  </div>
  <div class="legend">
    <div><span class="legend-dot" id="dot-data"></span> data blocks</div>
    <div><span class="legend-dot" style="background:#4a9ee6"></span> filter blocks</div>
    <div><span class="legend-dot" style="background:#e6a64a"></span> index blocks</div>
    <div><span class="legend-dot" style="background:#333"></span> no room</div>
  </div>
</div>
<script>
// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

document.getElementById('dot-data').style.background = ACCENT;

const content = document.getElementById('content');
const statusPanel = document.getElementById('status-panel');
const statusText = document.getElementById('status-text');
const statusSub = document.getElementById('status-sub');
const filesInput = document.getElementById('files');
const buttons = {
  balanced: document.getElementById('btn-balanced'),
  fragmented: document.getElementById('btn-fragmented'),
  bug: document.getElementById('btn-bug')
};

let mode = 'balanced';
let fileCount = 36;

function makeSvgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [key, value] of Object.entries(attrs)) el.setAttribute(key, value);
  return el;
}

function addText(parent, x, y, text, opts = {}) {
  const el = makeSvgEl('text', {
    x, y, fill: opts.fill || '#888', 'font-size': opts.size || '11',
    'font-family': 'IBM Plex Mono', 'text-anchor': opts.anchor || 'start'
  });
  el.textContent = text;
  parent.appendChild(el);
  return el;
}

function cacheModel() {
  const cacheMb = mode === 'bug' ? 8 : 512;
  const filterMb = mode === 'balanced' ? fileCount * 0.32 : fileCount * 1.05;
  const indexMb = mode === 'balanced' ? fileCount * 0.20 : fileCount * 0.82;
  const metadataMb = Math.min(cacheMb, filterMb + indexMb);
  const dataMb = Math.max(0, cacheMb - metadataMb);
  const desiredDataMb = mode === 'bug' ? 64 : 300;
  const missPct = Math.min(95, Math.max(5, 100 - (dataMb / desiredDataMb) * 92));
  return { cacheMb, filterMb, indexMb, metadataMb, dataMb, missPct };
}

function drawLookupPath(model) {
  const nodes = [
    { label: 'key', sub: 'lookup', x: 52, color: ACCENT },
    { label: 'bloom', sub: 'maybe file?', x: 184, color: '#4a9ee6' },
    { label: 'index', sub: 'find block', x: 316, color: '#e6a64a' },
    { label: 'data', sub: 'return row', x: 448, color: ACCENT },
    { label: 'disk', sub: `${Math.round(model.missPct)}% miss risk`, x: 580, color: model.missPct > 65 ? '#e64a4a' : '#666' }
  ];
  nodes.forEach((node, i) => {
    content.appendChild(makeSvgEl('rect', {
      x: node.x, y: 54, width: 92, height: 52, rx: 3,
      fill: node.color === ACCENT ? ACCENT_FILL_DARK : 'none',
      stroke: node.color, 'stroke-width': i === 4 && model.missPct < 45 ? 1 : 1.5
    }));
    addText(content, node.x + 46, 76, node.label, { fill: node.color, size: '11', anchor: 'middle' });
    addText(content, node.x + 46, 94, node.sub, { fill: '#666', size: '9', anchor: 'middle' });
    if (i < nodes.length - 1) {
      content.appendChild(makeSvgEl('line', {
        x1: node.x + 92, y1: 80, x2: nodes[i + 1].x, y2: 80,
        stroke: '#333', 'stroke-width': 1
      }));
      content.appendChild(makeSvgEl('polygon', {
        points: `${nodes[i + 1].x - 5},76 ${nodes[i + 1].x},80 ${nodes[i + 1].x - 5},84`,
        fill: '#333'
      }));
    }
  });
}

function drawCacheBar(model) {
  const x = 60;
  const y = 165;
  const w = 600;
  const h = 42;
  const filterW = Math.min(w, (Math.min(model.filterMb, model.cacheMb) / model.cacheMb) * w);
  const indexW = Math.min(w - filterW, (Math.min(model.indexMb, model.cacheMb) / model.cacheMb) * w);
  const dataW = Math.max(0, w - filterW - indexW);

  addText(content, x, y - 18, `effective block cache: ${model.cacheMb} MB`, {
    fill: mode === 'bug' ? '#e64a4a' : ACCENT, size: '10'
  });
  content.appendChild(makeSvgEl('rect', {
    x, y, width: w, height: h, rx: 3, fill: '#111', stroke: '#222', 'stroke-width': 1
  }));
  content.appendChild(makeSvgEl('rect', {
    x, y, width: filterW, height: h, rx: 3, fill: '#4a9ee6', opacity: 0.65
  }));
  content.appendChild(makeSvgEl('rect', {
    x: x + filterW, y, width: indexW, height: h, rx: 3, fill: '#e6a64a', opacity: 0.68
  }));
  content.appendChild(makeSvgEl('rect', {
    x: x + filterW + indexW, y, width: dataW, height: h, rx: 3, fill: ACCENT, opacity: 0.72
  }));
  addText(content, x + Math.max(16, filterW / 2), y + 26, 'filters', { fill: '#0a0a0a', size: '9', anchor: 'middle' });
  if (indexW > 42) addText(content, x + filterW + indexW / 2, y + 26, 'indexes', { fill: '#0a0a0a', size: '9', anchor: 'middle' });
  if (dataW > 42) addText(content, x + filterW + indexW + dataW / 2, y + 26, 'data', { fill: '#0a0a0a', size: '9', anchor: 'middle' });
}

function drawFilePressure(model) {
  const x0 = 60;
  const y0 = 242;
  const dots = Math.min(fileCount, 90);
  addText(content, x0, y0 - 18, `${fileCount} SST files means ${fileCount} bloom filters and ${fileCount} index sets`, {
    fill: '#666', size: '10'
  });
  for (let i = 0; i < dots; i++) {
    const x = x0 + (i % 30) * 18;
    const y = y0 + Math.floor(i / 30) * 16;
    const color = mode === 'balanced' && fileCount < 80 ? ACCENT_FAINT : fileCount > 120 ? '#e64a4a' : '#e6a64a';
    content.appendChild(makeSvgEl('rect', {
      x, y, width: 12, height: 10, rx: 1, fill: 'none', stroke: color, 'stroke-width': 1
    }));
  }
  if (fileCount > dots) addText(content, x0 + 550, y0 + 40, `+${fileCount - dots}`, { fill: '#888', size: '10' });
  addText(content, 560, 270, `data room ${Math.round(model.dataMb)} MB`, {
    fill: model.dataMb < 80 ? '#e64a4a' : model.dataMb < 180 ? '#e6a64a' : ACCENT,
    size: '10', anchor: 'middle'
  });
}

function renderStatus(model) {
  if (mode === 'bug') {
    statusText.textContent = 'the configured cache can look large while the effective RocksDB cache is tiny';
    statusSub.textContent = 'always verify the options dump and stats log, not only the control plane config';
    statusText.setAttribute('fill', '#e64a4a');
    statusPanel.setAttribute('stroke', '#e64a4a');
  } else if (model.dataMb < 120) {
    statusText.textContent = 'metadata is useful, but it is now crowding out the blocks reads actually return';
    statusSub.textContent = 'more SST files means more filters and indexes before a data block can stay hot';
    statusText.setAttribute('fill', '#e6a64a');
    statusPanel.setAttribute('stroke', '#e6a64a');
  } else {
    statusText.textContent = 'cache is large enough and mostly available for data blocks';
    statusSub.textContent = 'filters and indexes help reads, but they also spend cache';
    statusText.setAttribute('fill', ACCENT);
    statusPanel.setAttribute('stroke', ACCENT_DIM);
  }
}

function render() {
  content.innerHTML = '';
  Object.entries(buttons).forEach(([key, button]) => button.classList.toggle('active', key === mode));
  const model = cacheModel();
  drawLookupPath(model);
  drawCacheBar(model);
  drawFilePressure(model);
  renderStatus(model);
}

Object.entries(buttons).forEach(([key, button]) => {
  button.addEventListener('click', () => {
    mode = key;
    render();
  });
});

filesInput.addEventListener('input', () => {
  fileCount = Number(filesInput.value);
  render();
});

render();
</script>
</body>
</html>
