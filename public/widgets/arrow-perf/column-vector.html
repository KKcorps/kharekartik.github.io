<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Column Vector Layout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--w-accent); margin-bottom: 6px;
  }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  .legend {
    display: flex; gap: 16px; font-size: 11px; color: #666; margin-top: 14px; flex-wrap: wrap;
  }
  .legend-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// arrow column vector anatomy</div>
  <div class="widget-subtitle">toggle between int and varchar to see how arrow lays out column memory</div>

  <svg id="main-svg" viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg">
    <g id="content"></g>
  </svg>

  <div class="controls">
    <button id="btn-int" class="active">IntVector</button>
    <button id="btn-varchar">VarCharVector</button>
  </div>
  <div class="legend">
    <div><span class="legend-dot" id="dot-valid"></span> valid value</div>
    <div><span class="legend-dot" style="background:#e64a4a"></span> null</div>
    <div><span class="legend-dot" id="dot-buffer"></span> data buffer</div>
    <div><span class="legend-dot" style="background:#4a9ee6"></span> offset buffer</div>
  </div>
</div>
<script>
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

document.getElementById('dot-valid').style.background = ACCENT;
document.getElementById('dot-buffer').style.background = ACCENT_DIM;

// Data
const INT_DATA = {
  name: 'age (IntVector)',
  values: [25, 30, null, 42, 18],
  bitmap: [1, 1, 0, 1, 1],
  dataBytes: ['25', '30', '??', '42', '18'],
  byteWidth: 4
};

const VARCHAR_DATA = {
  name: 'name (VarCharVector)',
  values: ['"abc"', '"hello"', null, '"go"', '"rust"'],
  bitmap: [1, 1, 0, 1, 1],
  offsets: [0, 3, 8, 8, 10, 14],
  dataChars: 'abchellogorust',
  charRanges: [[0,3], [3,8], null, [8,10], [10,14]]
};

let mode = 'int';
const content = document.getElementById('content');

const CELL_W = 80;
const CELL_H = 38;
const GAP = 4;
const LEFT_LABEL = 120;
const START_X = LEFT_LABEL + 10;

function makeSvgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function addText(parent, x, y, label, opts = {}) {
  const el = makeSvgEl('text', {
    x, y, fill: opts.fill || '#888', 'font-size': opts.size || '13',
    'font-family': 'IBM Plex Mono', 'text-anchor': opts.anchor || 'middle'
  });
  el.textContent = label;
  parent.appendChild(el);
  return el;
}

function drawRow(y, label, cells, opts = {}) {
  addText(content, LEFT_LABEL / 2 + 20, y + CELL_H / 2 + 5, label, {
    fill: opts.labelColor || '#666', size: '11', anchor: 'end'
  });

  for (let i = 0; i < cells.length; i++) {
    const cx = START_X + i * (opts.cellW || CELL_W) + i * GAP;
    const cw = opts.cellW || CELL_W;
    const isNull = opts.nullIdx && opts.nullIdx.includes(i);
    const isHighlight = opts.highlightIdx && opts.highlightIdx.includes(i);

    let stroke = opts.stroke || ACCENT_DIM;
    let fill = opts.fill || 'none';
    let textFill = opts.textFill || '#888';

    if (isNull) {
      stroke = '#e64a4a'; fill = '#1a0a0a'; textFill = '#e64a4a';
    } else if (isHighlight) {
      stroke = opts.highlightStroke || ACCENT; fill = ACCENT_FILL; textFill = opts.highlightText || ACCENT;
    }

    content.appendChild(makeSvgEl('rect', {
      x: cx, y, width: cw, height: CELL_H, rx: 3,
      fill, stroke, 'stroke-width': (isNull || isHighlight) ? 1.5 : 1
    }));

    addText(content, cx + cw / 2, y + CELL_H / 2 + 5, cells[i], { fill: textFill, size: opts.fontSize || '13' });

    if (isNull && opts.strikethrough) {
      content.appendChild(makeSvgEl('line', {
        x1: cx + 6, y1: y + CELL_H / 2,
        x2: cx + cw - 6, y2: y + CELL_H / 2,
        stroke: '#e64a4a', 'stroke-width': 1
      }));
    }
  }
}

function drawBracket(x1, x2, y, label, color) {
  const bracketY = y + CELL_H + 6;
  content.appendChild(makeSvgEl('line', {
    x1, y1: bracketY, x2, y2: bracketY,
    stroke: color, 'stroke-width': 1
  }));
  content.appendChild(makeSvgEl('line', {
    x1, y1: bracketY - 4, x2: x1, y2: bracketY,
    stroke: color, 'stroke-width': 1
  }));
  content.appendChild(makeSvgEl('line', {
    x1: x2, y1: bracketY - 4, x2, y2: bracketY,
    stroke: color, 'stroke-width': 1
  }));
  addText(content, (x1 + x2) / 2, bracketY + 14, label, { fill: color, size: '9' });
}

const svg = document.getElementById('main-svg');

function render() {
  content.innerHTML = '';
  const ROW_GAP = 20; // gap between label and row
  const SECTION_GAP = 14; // gap between rows

  if (mode === 'int') {
    svg.setAttribute('viewBox', '0 0 720 360');

    addText(content, 360, 18, INT_DATA.name, { fill: ACCENT, size: '12' });

    // Values
    const y1 = 30;
    drawRow(y1, 'VALUES', INT_DATA.values.map(v => v === null ? 'null' : String(v)), {
      nullIdx: [2], highlightIdx: [0,1,3,4], highlightStroke: ACCENT, highlightText: ACCENT,
      strikethrough: true
    });

    // Separator
    const sepY = y1 + CELL_H + 10;
    addText(content, 360, sepY + 6, '\u2193  in memory  \u2193', { fill: '#444', size: '10' });

    // Bitmap
    const y2 = sepY + ROW_GAP;
    addText(content, 360, y2 - 4, 'VALIDITY BITMAP (1 bit per value)', { fill: '#555', size: '10' });
    drawRow(y2, 'BITMAP', INT_DATA.bitmap.map(String), {
      nullIdx: [2], highlightIdx: [0,1,3,4], cellW: CELL_W, fontSize: '14'
    });

    // Data buffer
    const y3 = y2 + CELL_H + ROW_GAP;
    addText(content, 360, y3 - 4, 'DATA BUFFER (4 bytes per slot, contiguous)', { fill: '#555', size: '10' });
    drawRow(y3, 'DATA', INT_DATA.dataBytes, {
      nullIdx: [2], highlightIdx: [0,1,3,4], stroke: ACCENT_DIM, strikethrough: true
    });

    for (let i = 0; i < 5; i++) {
      const cx = START_X + i * (CELL_W + GAP);
      addText(content, cx + CELL_W / 2, y3 + CELL_H + 14, `bytes ${i*4}\u2013${i*4+3}`, {
        fill: '#333', size: '9'
      });
    }

    // Status
    const statusY = y3 + CELL_H + 28;
    content.appendChild(makeSvgEl('rect', {
      x: 40, y: statusY, width: 640, height: 36, rx: 3,
      fill: 'none', stroke: '#222', 'stroke-width': 1
    }));
    addText(content, 360, statusY + 22, 'fixed width: every slot is 4 bytes, null slots still occupy space', {
      fill: '#888', size: '11'
    });

  } else {
    svg.setAttribute('viewBox', '0 0 720 360');

    addText(content, 360, 18, VARCHAR_DATA.name, { fill: ACCENT, size: '12' });

    // Values
    const y1 = 30;
    drawRow(y1, 'VALUES', VARCHAR_DATA.values.map(v => v === null ? 'null' : v), {
      nullIdx: [2], highlightIdx: [0,1,3,4], highlightStroke: ACCENT, highlightText: ACCENT,
      strikethrough: true
    });

    const sepY = y1 + CELL_H + 10;
    addText(content, 360, sepY + 6, '\u2193  in memory  \u2193', { fill: '#444', size: '10' });

    // Bitmap
    const y2 = sepY + ROW_GAP;
    addText(content, 360, y2 - 4, 'VALIDITY BITMAP', { fill: '#555', size: '10' });
    drawRow(y2, 'BITMAP', VARCHAR_DATA.bitmap.map(String), {
      nullIdx: [2], highlightIdx: [0,1,3,4], cellW: CELL_W, fontSize: '14'
    });

    // Offsets
    const y3 = y2 + CELL_H + ROW_GAP;
    addText(content, 360, y3 - 4, 'OFFSET BUFFER (n+1 entries, byte boundaries)', { fill: '#555', size: '10' });
    const offsetCellW = 62;
    drawRow(y3, 'OFFSETS', VARCHAR_DATA.offsets.map(String), {
      cellW: offsetCellW, stroke: '#4a9ee6', fill: 'none',
      textFill: '#4a9ee6', highlightIdx: [], fontSize: '14'
    });

    // Data buffer chars
    const y4 = y3 + CELL_H + ROW_GAP;
    addText(content, 360, y4 - 4, 'DATA BUFFER (variable length, packed tight)', { fill: '#555', size: '10' });
    const charW = 36;
    const chars = VARCHAR_DATA.dataChars.split('');
    const ranges = VARCHAR_DATA.charRanges;

    for (let i = 0; i < chars.length; i++) {
      const cx = START_X + i * (charW + 2);
      let color = ACCENT_DIM, fill = ACCENT_FILL_DARK, textColor = ACCENT_SOFT;
      let valueIdx = -1;
      for (let v = 0; v < ranges.length; v++) {
        if (ranges[v] && i >= ranges[v][0] && i < ranges[v][1]) { valueIdx = v; break; }
      }
      if (valueIdx === -1) { color = '#333'; fill = 'none'; textColor = '#333'; }

      content.appendChild(makeSvgEl('rect', {
        x: cx, y: y4, width: charW, height: CELL_H - 4, rx: 2,
        fill, stroke: color, 'stroke-width': 1
      }));
      addText(content, cx + charW / 2, y4 + (CELL_H - 4) / 2 + 5, chars[i], {
        fill: textColor, size: '13'
      });
    }

    // Brackets
    const bracketLabels = ['"abc"', '"hello"', null, '"go"', '"rust"'];
    for (let v = 0; v < ranges.length; v++) {
      if (ranges[v] === null) continue;
      const x1 = START_X + ranges[v][0] * (charW + 2);
      const x2 = START_X + (ranges[v][1] - 1) * (charW + 2) + charW;
      drawBracket(x1, x2, y4, bracketLabels[v], ACCENT);
    }

    // Status
    const statusY = y4 + CELL_H + 28;
    content.appendChild(makeSvgEl('rect', {
      x: 40, y: statusY, width: 640, height: 36, rx: 3,
      fill: 'none', stroke: '#222', 'stroke-width': 1
    }));
    addText(content, 360, statusY + 22, 'variable width: offsets mark where each value starts and ends', {
      fill: '#888', size: '11'
    });
  }
}

// Events
document.getElementById('btn-int').addEventListener('click', function () {
  mode = 'int';
  this.classList.add('active');
  document.getElementById('btn-varchar').classList.remove('active');
  render();
});
document.getElementById('btn-varchar').addEventListener('click', function () {
  mode = 'varchar';
  this.classList.add('active');
  document.getElementById('btn-int').classList.remove('active');
  render();
});

render();
</script>
</body>
</html>
