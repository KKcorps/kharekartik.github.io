<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorted Merge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--w-accent); margin-bottom: 6px;
  }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  .legend {
    display: flex; gap: 16px; font-size: 11px; color: #666; margin-top: 14px; flex-wrap: wrap;
  }
  .legend-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// sorted merge with bounded windows</div>
  <div class="widget-subtitle">step through the heap-based merge to see window reloads in action</div>

  <svg id="main-svg" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg">
    <g id="content"></g>
    <rect x="40" y="370" width="640" height="40" rx="3" fill="none" stroke="#222" stroke-width="1"/>
    <text x="360" y="395" text-anchor="middle" fill="#888" font-size="11"
          font-family="IBM Plex Mono" id="status-text">step through to merge three sorted files</text>
  </svg>

  <div class="controls">
    <button id="btn-prev">&larr; prev</button>
    <button id="btn-next">next &rarr;</button>
    <button id="btn-play">&#9654; play</button>
    <button id="btn-reset">reset</button>
  </div>
  <div class="legend">
    <div><span class="legend-dot" id="dot-window"></span> loaded window</div>
    <div><span class="legend-dot" style="background:#333"></span> not in memory</div>
    <div><span class="legend-dot" id="dot-pointer"></span> current pointer</div>
    <div><span class="legend-dot" style="background:#e6a64a"></span> reload</div>
  </div>
</div>
<script>
// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

// Legend dots
document.getElementById('dot-window').style.background = ACCENT_DIM;
document.getElementById('dot-pointer').style.background = ACCENT;

// 1. Data
const FILES = [
  { name: 'FILE A', data: [2, 5, 8, 11, 15, 19] },
  { name: 'FILE B', data: [1, 3, 7, 10, 14, 18] },
  { name: 'FILE C', data: [4, 6, 9, 12, 16, 20] }
];
const WINDOW_SIZE = 3;
const FILE_COLORS = [ACCENT, '#4a9ee6', '#e6a64a'];

// Precompute all merge steps
function precompute() {
  const states = FILES.map(f => ({
    ptr: 0,
    windowStart: 0,
    windowEnd: Math.min(WINDOW_SIZE, f.data.length),
    exhausted: false
  }));
  const output = [];
  const steps = [{ states: JSON.parse(JSON.stringify(states)), output: [], msg: 'Initial state: windows loaded, heap seeded', reload: -1, popFile: -1 }];

  while (true) {
    let minVal = Infinity, minF = -1;
    for (let i = 0; i < FILES.length; i++) {
      if (!states[i].exhausted && FILES[i].data[states[i].ptr] < minVal) {
        minVal = FILES[i].data[states[i].ptr];
        minF = i;
      }
    }
    if (minF === -1) break;

    output.push({ value: minVal, file: minF });
    states[minF].ptr++;

    let reload = -1;
    let msg = '';

    if (states[minF].ptr >= states[minF].windowEnd) {
      if (states[minF].ptr >= FILES[minF].data.length) {
        states[minF].exhausted = true;
        msg = `Pop ${minVal} from ${FILES[minF].name}. File fully consumed.`;
      } else {
        states[minF].windowStart = states[minF].ptr;
        states[minF].windowEnd = Math.min(states[minF].ptr + WINDOW_SIZE, FILES[minF].data.length);
        reload = minF;
        msg = `Pop ${minVal} from ${FILES[minF].name}. Window exhausted \u2192 reload next ${states[minF].windowEnd - states[minF].windowStart} rows`;
      }
    } else {
      msg = `Pop ${minVal} from ${FILES[minF].name}. Advance pointer.`;
    }

    steps.push({ states: JSON.parse(JSON.stringify(states)), output: output.map(o => ({ ...o })), msg, reload, popFile: minF });
  }

  steps.push({ states: JSON.parse(JSON.stringify(states)), output: output.map(o => ({ ...o })), msg: `Merge complete: ${output.length} rows in global sorted order`, reload: -1, popFile: -1 });
  return steps;
}

const STEPS = precompute();

// 2. State
let currentStep = 0;
let playing = false;
let interval;

// 3. DOM refs
const content = document.getElementById('content');
const statusText = document.getElementById('status-text');

// Layout
const FILE_W = 190;
const FILE_GAP = 25;
const FILE_START_X = (720 - (FILE_W * 3 + FILE_GAP * 2)) / 2;
const CELL_W = 28;
const CELL_H = 28;
const CELL_GAP = 3;

function makeSvgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function addText(parent, x, y, text, opts = {}) {
  const el = makeSvgEl('text', {
    x, y, fill: opts.fill || '#888', 'font-size': opts.size || '11',
    'font-family': 'IBM Plex Mono', 'text-anchor': opts.anchor || 'middle'
  });
  el.textContent = text;
  parent.appendChild(el);
  return el;
}

// 4. Render
function render() {
  content.innerHTML = '';
  const step = STEPS[currentStep];
  const { states, output, reload } = step;

  // File panels
  for (let f = 0; f < FILES.length; f++) {
    const fx = FILE_START_X + f * (FILE_W + FILE_GAP);
    const fy = 10;
    const file = FILES[f];
    const st = states[f];
    const color = FILE_COLORS[f];
    const isReload = reload === f;

    // File header
    addText(content, fx + FILE_W / 2, fy + 14, file.name, {
      fill: st.exhausted ? '#333' : color, size: '10'
    });

    // File box
    content.appendChild(makeSvgEl('rect', {
      x: fx, y: fy + 20, width: FILE_W, height: 80, rx: 3,
      fill: 'none', stroke: isReload ? '#e6a64a' : (st.exhausted ? '#1a1a1a' : '#222'),
      'stroke-width': isReload ? 1.5 : 1
    }));

    if (isReload) {
      addText(content, fx + FILE_W / 2, fy + 112, 'WINDOW RELOADED', { fill: '#e6a64a', size: '8' });
    }

    // Data cells (show all values in the file)
    const totalCells = file.data.length;
    const cellTotalW = totalCells * CELL_W + (totalCells - 1) * CELL_GAP;
    const cellStartX = fx + (FILE_W - cellTotalW) / 2;
    const cellY = fy + 38;

    for (let i = 0; i < totalCells; i++) {
      const cx = cellStartX + i * (CELL_W + CELL_GAP);
      const inWindow = i >= st.windowStart && i < st.windowEnd && !st.exhausted;
      const isPtr = i === st.ptr && !st.exhausted;
      const consumed = i < st.ptr;

      // Cell background
      let fillColor = 'none';
      let strokeColor = '#222';
      let strokeW = 1;
      let textColor = '#333';

      if (isPtr) {
        fillColor = ACCENT_FILL;
        strokeColor = color;
        strokeW = 1.5;
        textColor = color;
      } else if (consumed) {
        fillColor = ACCENT_FILL_DARK;
        strokeColor = ACCENT_DIM;
        strokeW = 1;
        textColor = '#444';
      } else if (inWindow) {
        fillColor = 'none';
        strokeColor = ACCENT_DIM;
        strokeW = 1;
        textColor = '#888';
      }

      content.appendChild(makeSvgEl('rect', {
        x: cx, y: cellY, width: CELL_W, height: CELL_H, rx: 2,
        fill: fillColor, stroke: strokeColor, 'stroke-width': strokeW
      }));

      addText(content, cx + CELL_W / 2, cellY + CELL_H / 2 + 4, String(file.data[i]), {
        fill: textColor, size: '11'
      });

      // Strikethrough for consumed
      if (consumed) {
        content.appendChild(makeSvgEl('line', {
          x1: cx + 3, y1: cellY + CELL_H / 2,
          x2: cx + CELL_W - 3, y2: cellY + CELL_H / 2,
          stroke: '#444', 'stroke-width': 1
        }));
      }
    }

    // Window bracket
    if (!st.exhausted) {
      const wStart = cellStartX + st.windowStart * (CELL_W + CELL_GAP) - 2;
      const wEnd = cellStartX + (st.windowEnd - 1) * (CELL_W + CELL_GAP) + CELL_W + 2;
      const bracketY = cellY + CELL_H + 4;
      content.appendChild(makeSvgEl('line', {
        x1: wStart, y1: bracketY, x2: wEnd, y2: bracketY,
        stroke: ACCENT_DIM, 'stroke-width': 1
      }));
      addText(content, (wStart + wEnd) / 2, bracketY + 12, 'window', { fill: '#444', size: '8' });
    } else {
      addText(content, fx + FILE_W / 2, cellY + CELL_H + 14, 'exhausted', { fill: '#333', size: '8' });
    }
  }

  // Heap section
  const heapY = 140;
  addText(content, 360, heapY, 'MIN-HEAP', { fill: '#666', size: '9' });

  // Collect current heap candidates
  const heapVals = [];
  for (let f = 0; f < FILES.length; f++) {
    if (!states[f].exhausted) {
      heapVals.push({ value: FILES[f].data[states[f].ptr], file: f });
    }
  }
  heapVals.sort((a, b) => a.value - b.value);

  const heapCellW = 56;
  const heapCellH = 30;
  const heapGap = 8;
  const heapTotalW = heapVals.length * heapCellW + (heapVals.length - 1) * heapGap;
  const heapStartX = 360 - heapTotalW / 2;
  const heapCellY = heapY + 8;

  for (let i = 0; i < heapVals.length; i++) {
    const hx = heapStartX + i * (heapCellW + heapGap);
    const isMin = i === 0;
    const color = FILE_COLORS[heapVals[i].file];

    content.appendChild(makeSvgEl('rect', {
      x: hx, y: heapCellY, width: heapCellW, height: heapCellH, rx: 2,
      fill: isMin ? ACCENT_FILL : 'none',
      stroke: isMin ? ACCENT : '#222', 'stroke-width': isMin ? 1.5 : 1
    }));

    addText(content, hx + heapCellW / 2, heapCellY + heapCellH / 2 + 4, String(heapVals[i].value), {
      fill: isMin ? ACCENT : '#666', size: '12'
    });

    // Tiny color indicator
    content.appendChild(makeSvgEl('rect', {
      x: hx + 2, y: heapCellY + 2, width: 4, height: 4, rx: 1,
      fill: color, stroke: 'none'
    }));
  }

  if (heapVals.length === 0 && currentStep > 0) {
    addText(content, 360, heapCellY + 18, 'empty', { fill: '#333', size: '10' });
  }

  // Arrow from heap to output
  content.appendChild(makeSvgEl('line', {
    x1: 360, y1: heapCellY + heapCellH + 6,
    x2: 360, y2: heapCellY + heapCellH + 20,
    stroke: '#333', 'stroke-width': 1
  }));
  content.appendChild(makeSvgEl('polygon', {
    points: `357,${heapCellY + heapCellH + 18} 360,${heapCellY + heapCellH + 24} 363,${heapCellY + heapCellH + 18}`,
    fill: '#444'
  }));

  // Output stream
  const outY = 220;
  addText(content, 360, outY, 'OUTPUT STREAM', { fill: '#666', size: '9' });

  const outCellW = 32;
  const outCellH = 28;
  const outGap = 2;
  const maxVisible = 18;
  const visibleOutput = output.slice(-maxVisible);
  const outTotalW = Math.min(output.length, maxVisible) * (outCellW + outGap) - outGap;
  const outStartX = 360 - outTotalW / 2;
  const outCellY = outY + 8;

  // Output background track
  content.appendChild(makeSvgEl('rect', {
    x: 40, y: outCellY - 2, width: 640, height: outCellH + 4, rx: 2,
    fill: 'none', stroke: '#1a1a1a', 'stroke-width': 1
  }));

  for (let i = 0; i < visibleOutput.length; i++) {
    const ox = outStartX + i * (outCellW + outGap);
    const isLast = (i === visibleOutput.length - 1) && currentStep > 0;
    const color = FILE_COLORS[visibleOutput[i].file];

    content.appendChild(makeSvgEl('rect', {
      x: ox, y: outCellY, width: outCellW, height: outCellH, rx: 2,
      fill: isLast ? ACCENT_FILL : ACCENT_FILL_DARK,
      stroke: isLast ? ACCENT : ACCENT_DIM, 'stroke-width': isLast ? 1.5 : 1
    }));

    addText(content, ox + outCellW / 2, outCellY + outCellH / 2 + 4, String(visibleOutput[i].value), {
      fill: isLast ? ACCENT : ACCENT_MID, size: '10'
    });

    // Color dot
    content.appendChild(makeSvgEl('circle', {
      cx: ox + outCellW / 2, cy: outCellY - 4, r: 2,
      fill: color, stroke: 'none'
    }));
  }

  // Counter
  addText(content, 680, outCellY + outCellH / 2 + 4, `${output.length}/${FILES.reduce((s, f) => s + f.data.length, 0)}`, {
    fill: '#444', size: '9', anchor: 'end'
  });

  // Step counter
  addText(content, 680, 355, `step ${currentStep}/${STEPS.length - 1}`, {
    fill: '#333', size: '9', anchor: 'end'
  });

  // Status
  statusText.textContent = step.msg;
  statusText.setAttribute('fill', reload >= 0 ? '#e6a64a' : '#888');
}

// 5. Event handlers
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentStep < STEPS.length - 1) { currentStep++; render(); }
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentStep > 0) { currentStep--; render(); }
});

document.getElementById('btn-play').addEventListener('click', function () {
  playing = !playing;
  this.textContent = playing ? '\u23F8 pause' : '\u25B6 play';
  this.classList.toggle('active', playing);
  if (playing) {
    interval = setInterval(() => {
      if (currentStep < STEPS.length - 1) { currentStep++; render(); }
      else {
        clearInterval(interval);
        playing = false;
        document.getElementById('btn-play').textContent = '\u25B6 play';
        document.getElementById('btn-play').classList.remove('active');
      }
    }, 900);
  } else {
    clearInterval(interval);
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  currentStep = 0;
  playing = false;
  clearInterval(interval);
  document.getElementById('btn-play').textContent = '\u25B6 play';
  document.getElementById('btn-play').classList.remove('active');
  render();
});

// 6. Init
render();
</script>
</body>
</html>
