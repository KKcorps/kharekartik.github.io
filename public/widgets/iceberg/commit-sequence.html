<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metadata Commit Sequence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--w-accent); margin-bottom: 6px; }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  button.danger:hover { border-color: #e64a4a; color: #e64a4a; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// metadata commit sequence</div>
  <div class="widget-subtitle">step through a write operation — inject failures to see atomicity in action</div>

  <svg id="main-svg" viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg">
    <g id="pipeline"></g>
    <g id="connectors"></g>

    <!-- result panel -->
    <rect x="40" y="310" width="640" height="55" rx="3" fill="none" stroke="#222" stroke-width="1" id="result-panel"/>
    <text x="360" y="332" text-anchor="middle" fill="#888" font-size="11" font-family="IBM Plex Mono" id="result-text">step through to see the commit sequence</text>
    <text x="360" y="350" text-anchor="middle" fill="#555" font-size="9" font-family="IBM Plex Mono" id="result-sub"></text>
  </svg>

  <div class="controls">
    <button id="btn-next">next step →</button>
    <button id="btn-prev">← prev step</button>
    <button id="btn-fail" class="danger">inject failure</button>
    <button id="btn-reset">reset</button>
  </div>
</div>

<script>

// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

const stages = [
  { label: 'WRITE\nPARQUET\nFILES', desc: 'write new data files to object storage', detail: 'files land on S3 but no snapshot references them yet' },
  { label: 'PREPARE\nMANIFEST', desc: 'build manifest listing new + existing files', detail: 'manifest describes which files belong to the new table version' },
  { label: 'ATOMIC\nMETADATA\nCOMMIT', desc: 'publish new snapshot pointing to manifest', detail: 'this is the real commit — readers now see the new version' },
  { label: 'SNAPSHOT\nVISIBLE', desc: 'new version available for queries', detail: 'table state advanced — old snapshots still accessible for time travel' },
];

const pipeline = document.getElementById('pipeline');
const connectors = document.getElementById('connectors');
const resultText = document.getElementById('result-text');
const resultSub = document.getElementById('result-sub');
const resultPanel = document.getElementById('result-panel');

let currentStep = -1;
let failAt = -1;
let failed = false;

function render() {
  pipeline.innerHTML = '';
  connectors.innerHTML = '';

  const ox = 40, oy = 40, bw = 145, bh = 110, gap = 20;

  stages.forEach((s, i) => {
    const x = ox + i * (bw + gap);
    const isActive = i <= currentStep && !failed;
    const isCurrent = i === currentStep;
    const isFailed = failed && i === failAt;
    const isPast = i < currentStep && !failed;
    const isFuture = i > currentStep || (failed && i > failAt);

    let strokeColor = '#222';
    let fillColor = 'none';
    let textColor = '#333';

    if (isFailed) { strokeColor = '#e64a4a'; textColor = '#e64a4a'; }
    else if (isCurrent) { strokeColor = ACCENT; textColor = ACCENT; }
    else if (isPast) { strokeColor = ACCENT_DIM; textColor = ACCENT_MID; fillColor = ACCENT_FILL_DARK; }

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', x); rect.setAttribute('y', oy);
    rect.setAttribute('width', bw); rect.setAttribute('height', bh); rect.setAttribute('rx', 3);
    rect.setAttribute('fill', fillColor); rect.setAttribute('stroke', strokeColor);
    rect.setAttribute('stroke-width', isCurrent || isFailed ? '2' : '1');
    pipeline.appendChild(rect);

    // step number
    const num = document.createElementNS('http://www.w3.org/2000/svg','text');
    num.setAttribute('x', x + 12); num.setAttribute('y', oy + 18);
    num.setAttribute('font-size', '9'); num.setAttribute('font-family', 'IBM Plex Mono');
    num.setAttribute('fill', isCurrent ? ACCENT : (isFailed ? '#e64a4a' : '#444'));
    num.textContent = `0${i + 1}`;
    pipeline.appendChild(num);

    // label
    const lines = s.label.split('\n');
    lines.forEach((line, li) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', x + bw/2); t.setAttribute('y', oy + 45 + li * 16);
      t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', '11');
      t.setAttribute('font-family', 'IBM Plex Mono'); t.setAttribute('fill', textColor);
      t.textContent = line;
      pipeline.appendChild(t);
    });

    // checkmark or X
    if (isPast) {
      const check = document.createElementNS('http://www.w3.org/2000/svg','text');
      check.setAttribute('x', x + bw - 16); check.setAttribute('y', oy + 18);
      check.setAttribute('font-size', '12'); check.setAttribute('fill', ACCENT_MID);
      check.textContent = '✓';
      pipeline.appendChild(check);
    }
    if (isFailed) {
      const xmark = document.createElementNS('http://www.w3.org/2000/svg','text');
      xmark.setAttribute('x', x + bw - 16); xmark.setAttribute('y', oy + 18);
      xmark.setAttribute('font-size', '12'); xmark.setAttribute('fill', '#e64a4a');
      xmark.textContent = '✗';
      pipeline.appendChild(xmark);
    }

    // connector arrow
    if (i < stages.length - 1) {
      const ax = x + bw + 2, ay = oy + bh/2;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', ax); line.setAttribute('y1', ay);
      line.setAttribute('x2', ax + gap - 4); line.setAttribute('y2', ay);
      line.setAttribute('stroke', isPast ? ACCENT_DIM : '#222'); line.setAttribute('stroke-width', '1');
      connectors.appendChild(line);
      const arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      arrow.setAttribute('points', `${ax+gap-4},${ay-4} ${ax+gap},${ay} ${ax+gap-4},${ay+4}`);
      arrow.setAttribute('fill', isPast ? ACCENT_DIM : '#222');
      connectors.appendChild(arrow);
    }
  });

  // table state indicator
  const tableY = 200;
  const tableRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  tableRect.setAttribute('x', 40); tableRect.setAttribute('y', tableY);
  tableRect.setAttribute('width', 640); tableRect.setAttribute('height', 70); tableRect.setAttribute('rx', 3);
  tableRect.setAttribute('fill', 'none'); tableRect.setAttribute('stroke', '#222');
  pipeline.appendChild(tableRect);

  const tlabel = document.createElementNS('http://www.w3.org/2000/svg','text');
  tlabel.setAttribute('x', 60); tlabel.setAttribute('y', tableY + 18);
  tlabel.setAttribute('font-size', '9'); tlabel.setAttribute('font-family', 'IBM Plex Mono');
  tlabel.setAttribute('fill', '#444'); tlabel.textContent = 'TABLE STATE';
  pipeline.appendChild(tlabel);

  const tstate = document.createElementNS('http://www.w3.org/2000/svg','text');
  tstate.setAttribute('x', 60); tstate.setAttribute('y', tableY + 38);
  tstate.setAttribute('font-size', '11'); tstate.setAttribute('font-family', 'IBM Plex Mono');

  if (failed) {
    tstate.setAttribute('fill', ACCENT);
    tstate.textContent = 'table unchanged — still on previous snapshot (atomicity preserved)';
    const orphan = document.createElementNS('http://www.w3.org/2000/svg','text');
    orphan.setAttribute('x', 60); orphan.setAttribute('y', tableY + 55);
    orphan.setAttribute('font-size', '9'); orphan.setAttribute('font-family', 'IBM Plex Mono');
    orphan.setAttribute('fill', '#666');
    orphan.textContent = 'orphan files on storage can be cleaned up by vacuum/gc';
    pipeline.appendChild(orphan);
  } else if (currentStep >= 3) {
    tstate.setAttribute('fill', ACCENT);
    tstate.textContent = 'table advanced to new version — commit successful';
  } else if (currentStep >= 0) {
    tstate.setAttribute('fill', '#888');
    tstate.textContent = 'table still on previous version — commit not yet complete';
  } else {
    tstate.setAttribute('fill', '#555');
    tstate.textContent = 'waiting for write operation...';
  }
  pipeline.appendChild(tstate);

  // update result panel
  if (failed) {
    resultText.textContent = `failure at step ${failAt + 1}: ${stages[failAt].desc}`;
    resultText.setAttribute('fill', '#e64a4a');
    resultSub.textContent = 'no snapshot published — table is unchanged — this is atomicity';
    resultPanel.setAttribute('stroke', '#e64a4a');
  } else if (currentStep >= 0 && currentStep < stages.length) {
    resultText.textContent = stages[currentStep].desc;
    resultText.setAttribute('fill', ACCENT);
    resultSub.textContent = stages[currentStep].detail;
    resultPanel.setAttribute('stroke', '#222');
  } else {
    resultText.textContent = 'step through to see the commit sequence';
    resultText.setAttribute('fill', '#888');
    resultSub.textContent = '';
  }
}

document.getElementById('btn-next').addEventListener('click', () => {
  if (failed) return;
  if (currentStep < stages.length - 1) { currentStep++; render(); }
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (failed) { failed = false; failAt = -1; currentStep = Math.max(-1, currentStep - 1); }
  else if (currentStep >= 0) currentStep--;
  render();
});

document.getElementById('btn-fail').addEventListener('click', () => {
  if (currentStep < 0 || currentStep >= stages.length - 1 || failed) return;
  failAt = currentStep;
  failed = true;
  render();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  currentStep = -1; failAt = -1; failed = false; render();
});

render();
</script>
</body>
</html>
