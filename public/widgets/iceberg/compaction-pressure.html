<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compaction Pressure Meter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--w-accent); margin-bottom: 6px; }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  .slider-wrap { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #666; }
  input[type="range"] {
    -webkit-appearance: none; width: 100px; height: 4px; background: #333; border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; background: var(--w-accent); border-radius: 50%; cursor: pointer;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// compaction pressure meter</div>
  <div class="widget-subtitle">watch metadata bloat accumulate — compact to clean up</div>

  <svg id="main-svg" viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg">
    <!-- gauges -->
    <g id="gauges"></g>

    <!-- file pile visualization -->
    <text x="40" y="185" fill="#666" font-size="10" font-family="IBM Plex Mono">FILE PILE</text>
    <g id="file-pile"></g>

    <!-- status -->
    <rect x="40" y="340" width="640" height="45" rx="3" fill="none" stroke="#222" stroke-width="1" id="status-panel"/>
    <text x="360" y="363" text-anchor="middle" fill="#888" font-size="11" font-family="IBM Plex Mono" id="status-text">table healthy — low metadata overhead</text>
    <text x="360" y="378" text-anchor="middle" fill="#555" font-size="9" font-family="IBM Plex Mono" id="status-sub"></text>
  </svg>

  <div class="controls">
    <button id="btn-play">▶ accumulate</button>
    <button id="btn-compact">compact</button>
    <button id="btn-reset">reset</button>
    <div class="slider-wrap">
      speed: <input type="range" id="speed" min="1" max="10" value="5">
    </div>
  </div>
</div>

<script>

// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

const gaugesG = document.getElementById('gauges');
const filePile = document.getElementById('file-pile');
const statusText = document.getElementById('status-text');
const statusSub = document.getElementById('status-sub');
const statusPanel = document.getElementById('status-panel');

let smallFiles = 3;
let deleteVectors = 0;
let manifests = 1;
let playing = false;
let interval;

function readCost() {
  return Math.min(100, smallFiles * 2 + deleteVectors * 5 + manifests * 1.5);
}

function gaugeColor(pct) {
  if (pct < 30) return ACCENT;
  if (pct < 60) return '#e6a64a';
  return '#e64a4a';
}

function render() {
  gaugesG.innerHTML = '';
  filePile.innerHTML = '';

  const cost = readCost();
  const color = gaugeColor(cost);

  // gauge bars
  const metrics = [
    { label: 'SMALL FILES', value: smallFiles, max: 40 },
    { label: 'DELETE VECTORS', value: deleteVectors, max: 15 },
    { label: 'MANIFESTS', value: manifests, max: 20 },
    { label: 'READ COST', value: Math.round(cost), max: 100, isMain: true },
  ];

  metrics.forEach((m, i) => {
    const y = 20 + i * 38;
    const barX = 200, barW = 440, barH = 18;

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', 40); label.setAttribute('y', y + 14);
    label.setAttribute('font-size', '10'); label.setAttribute('font-family', 'IBM Plex Mono');
    label.setAttribute('fill', m.isMain ? color : '#666');
    label.textContent = m.label;
    gaugesG.appendChild(label);

    // track
    const track = document.createElementNS('http://www.w3.org/2000/svg','rect');
    track.setAttribute('x', barX); track.setAttribute('y', y);
    track.setAttribute('width', barW); track.setAttribute('height', barH); track.setAttribute('rx', 2);
    track.setAttribute('fill', '#111'); track.setAttribute('stroke', '#222');
    gaugesG.appendChild(track);

    // fill
    const pct = Math.min(1, m.value / m.max);
    const fillColor = m.isMain ? color : (pct > 0.7 ? '#e6a64a' : ACCENT_DIM);
    const fill = document.createElementNS('http://www.w3.org/2000/svg','rect');
    fill.setAttribute('x', barX); fill.setAttribute('y', y);
    fill.setAttribute('width', barW * pct); fill.setAttribute('height', barH); fill.setAttribute('rx', 2);
    fill.setAttribute('fill', fillColor); fill.setAttribute('opacity', m.isMain ? '0.8' : '0.5');
    gaugesG.appendChild(fill);

    // value
    const val = document.createElementNS('http://www.w3.org/2000/svg','text');
    val.setAttribute('x', barX + barW + 10); val.setAttribute('y', y + 14);
    val.setAttribute('font-size', '10'); val.setAttribute('font-family', 'IBM Plex Mono');
    val.setAttribute('fill', m.isMain ? color : '#888');
    val.textContent = m.isMain ? `${m.value}%` : m.value;
    gaugesG.appendChild(val);
  });

  // file pile — tiny rectangles
  const maxPileFiles = Math.min(smallFiles + Math.floor(deleteVectors * 0.5), 60);
  const ox = 40, oy = 200, fw = 14, fh = 20, gap = 2, cols = 30;
  for (let i = 0; i < maxPileFiles; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const x = ox + col * (fw + gap), y = oy + row * (fh + gap);
    const isDV = i >= smallFiles;

    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x', x); r.setAttribute('y', y);
    r.setAttribute('width', fw); r.setAttribute('height', fh); r.setAttribute('rx', 1);
    r.setAttribute('fill', isDV ? '#1a0a0a' : ACCENT_FILL_DARK);
    r.setAttribute('stroke', isDV ? '#e64a4a33' : ACCENT_FAINT);
    filePile.appendChild(r);
  }

  // status
  if (cost < 30) {
    statusText.textContent = 'table healthy — low metadata overhead';
    statusText.setAttribute('fill', ACCENT);
    statusSub.textContent = '';
    statusPanel.setAttribute('stroke', '#222');
  } else if (cost < 60) {
    statusText.textContent = 'metadata accumulating — reads getting heavier';
    statusText.setAttribute('fill', '#e6a64a');
    statusSub.textContent = 'consider scheduling compaction soon';
    statusPanel.setAttribute('stroke', '#e6a64a');
  } else {
    statusText.textContent = '⚠ high metadata pressure — read performance degraded';
    statusText.setAttribute('fill', '#e64a4a');
    statusSub.textContent = 'compact now — too many small files and delete vectors';
    statusPanel.setAttribute('stroke', '#e64a4a');
  }
}

function tick() {
  const adds = Math.random();
  if (adds < 0.6) smallFiles += Math.ceil(Math.random() * 3);
  if (adds < 0.3) deleteVectors += 1;
  if (Math.random() < 0.2) manifests += 1;
  render();
}

function compact() {
  // simulate compaction
  smallFiles = Math.max(2, Math.floor(smallFiles / 5));
  deleteVectors = 0;
  manifests = Math.max(1, Math.floor(manifests / 3));
  render();
}

document.getElementById('btn-play').addEventListener('click', function() {
  playing = !playing;
  this.textContent = playing ? '⏸ pause' : '▶ accumulate';
  this.classList.toggle('active', playing);
  if (playing) {
    const speed = 11 - document.getElementById('speed').value;
    interval = setInterval(tick, speed * 150);
  } else clearInterval(interval);
});

document.getElementById('speed').addEventListener('input', function() {
  if (playing) {
    clearInterval(interval);
    const speed = 11 - this.value;
    interval = setInterval(tick, speed * 150);
  }
});

document.getElementById('btn-compact').addEventListener('click', compact);
document.getElementById('btn-reset').addEventListener('click', () => {
  playing = false; clearInterval(interval);
  document.getElementById('btn-play').textContent = '▶ accumulate';
  document.getElementById('btn-play').classList.remove('active');
  smallFiles = 3; deleteVectors = 0; manifests = 1;
  render();
});

render();
</script>
</body>
</html>
