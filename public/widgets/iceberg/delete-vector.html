<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Vector Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--w-accent); margin-bottom: 6px; }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  button.danger { border-color: #e64a4a; }
  button.danger:hover { border-color: #e64a4a; color: #e64a4a; }
  .stats {
    display: flex; gap: 24px; margin-top: 14px; font-size: 11px; color: #666;
  }
  .stats span { color: var(--w-accent); }
  .stats .del { color: #e64a4a; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// delete vector visualizer</div>
  <div class="widget-subtitle">each cell is a row in a parquet file — delete marks rows as gone without rewriting the file</div>

  <svg id="main-svg" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg">
    <text x="40" y="24" fill="#666" font-size="10" font-family="IBM Plex Mono">DATA FILE: part-004.parquet</text>
    <text x="40" y="38" fill="#444" font-size="9" font-family="IBM Plex Mono" id="file-status">100 rows • 0 deleted • base file untouched</text>

    <g id="grid"></g>

    <!-- delete vector panel -->
    <rect x="40" y="290" width="640" height="50" rx="3" fill="none" stroke="#222" stroke-width="1" id="dv-panel"/>
    <text x="360" y="310" text-anchor="middle" fill="#666" font-size="10" font-family="IBM Plex Mono" id="dv-label">DELETE VECTOR</text>
    <text x="360" y="330" text-anchor="middle" fill="#888" font-size="11" font-family="IBM Plex Mono" id="dv-content">empty — no rows marked for deletion</text>
  </svg>

  <div class="controls">
    <button id="btn-delete" class="danger">delete 10 rows</button>
    <button id="btn-delete5" class="danger">delete 5 more</button>
    <button id="btn-compact">compact</button>
    <button id="btn-reset">reset</button>
  </div>
  <div class="stats">
    <div>base file rows: <span id="stat-base">100</span></div>
    <div>visible rows: <span id="stat-visible">100</span></div>
    <div>delete vector: <span class="del" id="stat-dv">0</span></div>
  </div>
</div>

<script>

// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

const TOTAL = 100;
const COLS = 20, ROWS = 5;
const grid = document.getElementById('grid');
const dvContent = document.getElementById('dv-content');
const dvPanel = document.getElementById('dv-panel');
const dvLabel = document.getElementById('dv-label');
const fileStatus = document.getElementById('file-status');

let cells = [];
let deleted = new Set();
let compacted = false;

function init() {
  grid.innerHTML = '';
  cells = [];
  deleted = new Set();
  compacted = false;

  const ox = 40, oy = 55, cw = 32, ch = 40, gap = 1;
  for (let i = 0; i < TOTAL; i++) {
    const col = i % COLS, row = Math.floor(i / COLS);
    const x = ox + col * (cw + gap), y = oy + row * (ch + gap);

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', cw); rect.setAttribute('height', ch); rect.setAttribute('rx', 1);
    rect.setAttribute('fill', ACCENT_FILL); rect.setAttribute('stroke', ACCENT_DIM); rect.setAttribute('stroke-width', '0.5');
    grid.appendChild(rect);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', x + cw/2); txt.setAttribute('y', y + ch/2 + 3);
    txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-size', '7');
    txt.setAttribute('font-family', 'IBM Plex Mono'); txt.setAttribute('fill', ACCENT_SOFT);
    txt.textContent = String(i).padStart(2, '0');
    grid.appendChild(txt);

    cells.push({ rect, txt, idx: i });
  }
  updateStats();
}

function markDeleted(indices) {
  indices.forEach(i => {
    if (deleted.has(i) || i >= cells.length) return;
    deleted.add(i);
    const c = cells[i];
    c.rect.setAttribute('fill', '#1a0a0a');
    c.rect.setAttribute('stroke', '#e64a4a');
    c.rect.setAttribute('stroke-width', '1');
    c.txt.setAttribute('fill', '#e64a4a');

    // strikethrough
    const x = parseFloat(c.rect.getAttribute('x'));
    const y = parseFloat(c.rect.getAttribute('y'));
    const w = parseFloat(c.rect.getAttribute('width'));
    const h = parseFloat(c.rect.getAttribute('height'));
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x + 3); line.setAttribute('y1', y + h/2);
    line.setAttribute('x2', x + w - 3); line.setAttribute('y2', y + h/2);
    line.setAttribute('stroke', '#e64a4a'); line.setAttribute('stroke-width', '1');
    line.classList.add('del-line');
    grid.appendChild(line);
  });
  updateStats();
}

function getRandomUndeleted(n) {
  const available = [];
  for (let i = 0; i < cells.length; i++) {
    if (!deleted.has(i)) available.push(i);
  }
  const shuffled = available.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(n, available.length));
}

function compact() {
  if (deleted.size === 0) return;
  compacted = true;
  const remaining = cells.length - deleted.size;

  grid.innerHTML = '';
  cells = [];
  const ox = 40, oy = 55, cw = 32, ch = 40, gap = 1;
  const newCols = COLS;

  for (let i = 0; i < remaining; i++) {
    const col = i % newCols, row = Math.floor(i / newCols);
    const x = ox + col * (cw + gap), y = oy + row * (ch + gap);

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', cw); rect.setAttribute('height', ch); rect.setAttribute('rx', 1);
    rect.setAttribute('fill', ACCENT_FILL); rect.setAttribute('stroke', ACCENT); rect.setAttribute('stroke-width', '0.5');
    grid.appendChild(rect);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', x + cw/2); txt.setAttribute('y', y + ch/2 + 3);
    txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-size', '7');
    txt.setAttribute('font-family', 'IBM Plex Mono'); txt.setAttribute('fill', ACCENT);
    txt.textContent = String(i).padStart(2, '0');
    grid.appendChild(txt);

    cells.push({ rect, txt, idx: i });
  }

  deleted = new Set();
  document.getElementById('stat-base').textContent = remaining;
  document.getElementById('stat-visible').textContent = remaining;
  document.getElementById('stat-dv').textContent = '0';
  dvContent.textContent = 'compacted — new clean file written, delete vector cleared';
  dvContent.setAttribute('fill', ACCENT);
  dvPanel.setAttribute('stroke', ACCENT);
  fileStatus.textContent = `${remaining} rows • compacted into new file • old file + delete vector removed`;
}

function updateStats() {
  const base = compacted ? cells.length : TOTAL;
  const vis = cells.length - deleted.size;
  document.getElementById('stat-base').textContent = base;
  document.getElementById('stat-visible').textContent = vis;
  document.getElementById('stat-dv').textContent = deleted.size;

  if (deleted.size > 0) {
    const positions = [...deleted].sort((a,b) => a-b).join(', ');
    dvContent.textContent = `positions: [${positions}]`;
    dvContent.setAttribute('fill', '#e64a4a');
    dvPanel.setAttribute('stroke', '#e64a4a');
    dvLabel.setAttribute('fill', '#e64a4a');
    fileStatus.textContent = `${base} rows on disk • ${deleted.size} marked deleted • base file untouched`;
  } else if (!compacted) {
    dvContent.textContent = 'empty — no rows marked for deletion';
    dvContent.setAttribute('fill', '#888');
    dvPanel.setAttribute('stroke', '#222');
    dvLabel.setAttribute('fill', '#666');
    fileStatus.textContent = `${base} rows • 0 deleted • base file untouched`;
  }
}

document.getElementById('btn-delete').addEventListener('click', () => markDeleted(getRandomUndeleted(10)));
document.getElementById('btn-delete5').addEventListener('click', () => markDeleted(getRandomUndeleted(5)));
document.getElementById('btn-compact').addEventListener('click', compact);
document.getElementById('btn-reset').addEventListener('click', init);

init();
</script>
</body>
</html>
