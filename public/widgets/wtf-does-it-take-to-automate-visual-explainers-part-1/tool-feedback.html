<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Feedback Quality</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--w-accent); margin-bottom: 6px;
  }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  .mode-label { margin-left: auto; font-size: 11px; color: #666; }
  .mode-label span { color: var(--w-accent); }
  .stats {
    display: flex; gap: 24px; font-size: 11px; color: #666; margin-top: 14px;
  }
  .stats span { color: var(--w-accent); }
  .stats .bad { color: #e64a4a; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// tool feedback quality</div>
  <div class="widget-subtitle">toggle between raw and instructive errors — step through to see how each affects the agent's recovery</div>

  <svg id="main-svg" viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg">
    <g id="content"></g>
    <rect x="40" y="325" width="640" height="45" rx="3" fill="none" stroke="#222" stroke-width="1"/>
    <text x="360" y="352" text-anchor="middle" fill="#888" font-size="11"
          font-family="IBM Plex Mono" id="status-text">choose an error mode, then step through</text>
  </svg>

  <div class="controls">
    <button id="btn-raw">raw errors</button>
    <button id="btn-instructive">instructive errors</button>
    <button id="btn-step">next step →</button>
    <button id="btn-reset">reset</button>
    <div class="mode-label">mode: <span id="mode-display">none</span></div>
  </div>
  <div class="stats">
    <div>turns used: <span id="stat-turns">0</span></div>
    <div>turns wasted: <span class="bad" id="stat-wasted">0</span></div>
    <div>resolved: <span id="stat-resolved">—</span></div>
  </div>
</div>
<script>
// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

// 1. State
// Raw error sequence: agent flails, retries blindly
const rawSequence = [
  { type: 'action',  label: 'apply_patch', desc: 'Update File: src/engine.py', side: 'agent' },
  { type: 'error',   label: 'DiffError', desc: 'Invalid line in update section at line 47', side: 'harness' },
  { type: 'action',  label: 'apply_patch', desc: 'retries same patch, same format', side: 'agent' },
  { type: 'error',   label: 'DiffError', desc: 'Invalid line in update section at line 47', side: 'harness' },
  { type: 'action',  label: 'shell', desc: 'cat src/engine.py — reads entire file', side: 'agent' },
  { type: 'action',  label: 'apply_patch', desc: 'rewrites entire file from scratch', side: 'agent' },
  { type: 'error',   label: 'DiffError', desc: "File exists — can't use Add File", side: 'harness' },
  { type: 'action',  label: 'shell', desc: 'rm src/engine.py && re-create', side: 'agent' },
  { type: 'action',  label: 'apply_patch', desc: 'Add File with full contents', side: 'agent' },
  { type: 'result',  label: 'applied', desc: '7 turns to fix one patch — scorched earth', side: 'harness' },
];

// Instructive error sequence: agent gets clear guidance, fixes fast
const instructiveSequence = [
  { type: 'action',  label: 'apply_patch', desc: 'Update File: src/engine.py', side: 'agent' },
  { type: 'error',   label: 'DiffError', desc: "expected $$ or @@ context marker, got '+' — each section needs a context anchor", side: 'harness' },
  { type: 'action',  label: 'apply_patch', desc: 'fixes context marker to $$ def update()', side: 'agent' },
  { type: 'result',  label: 'applied', desc: '2 turns — error told agent exactly what was wrong and what to do', side: 'harness' },
];

let mode = null; // 'raw' | 'instructive'
let stepIdx = -1;

// 2. DOM refs
const content = document.getElementById('content');
const statusText = document.getElementById('status-text');

function currentSequence() {
  return mode === 'instructive' ? instructiveSequence : rawSequence;
}

// Helper: wrap text into multiple lines
function wrapText(container, text, x, y, maxWidth, fontSize, fill) {
  const words = text.split(' ');
  let line = '';
  let lineY = y;
  const lineHeight = fontSize + 3;

  words.forEach((word, i) => {
    const testLine = line ? line + ' ' + word : word;
    // Approximate: each char ~= fontSize * 0.6
    if (testLine.length * fontSize * 0.6 > maxWidth && line) {
      const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      tspan.setAttribute('x', x);
      tspan.setAttribute('y', lineY);
      tspan.setAttribute('font-size', fontSize);
      tspan.setAttribute('font-family', 'IBM Plex Mono');
      tspan.setAttribute('fill', fill);
      tspan.textContent = line;
      container.appendChild(tspan);
      line = word;
      lineY += lineHeight;
    } else {
      line = testLine;
    }
  });
  if (line) {
    const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    tspan.setAttribute('x', x);
    tspan.setAttribute('y', lineY);
    tspan.setAttribute('font-size', fontSize);
    tspan.setAttribute('font-family', 'IBM Plex Mono');
    tspan.setAttribute('fill', fill);
    tspan.textContent = line;
    container.appendChild(tspan);
  }
}

// 3. Render
function render() {
  content.innerHTML = '';

  const seq = mode ? currentSequence() : [];
  const startY = 14;
  const rowH = 56;
  const agentX = 40;
  const harnessX = 380;
  const boxW = 290;
  const boxH = 44;

  // Column headers
  const agentHeader = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  agentHeader.setAttribute('x', agentX);
  agentHeader.setAttribute('y', startY);
  agentHeader.setAttribute('font-size', '10');
  agentHeader.setAttribute('font-family', 'IBM Plex Mono');
  agentHeader.setAttribute('fill', '#666');
  agentHeader.textContent = 'AGENT';
  content.appendChild(agentHeader);

  const harnessHeader = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  harnessHeader.setAttribute('x', harnessX);
  harnessHeader.setAttribute('y', startY);
  harnessHeader.setAttribute('font-size', '10');
  harnessHeader.setAttribute('font-family', 'IBM Plex Mono');
  harnessHeader.setAttribute('fill', '#666');
  harnessHeader.textContent = 'HARNESS RESPONSE';
  content.appendChild(harnessHeader);

  // Center divider
  const divider = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  divider.setAttribute('x1', 365);
  divider.setAttribute('y1', startY + 8);
  divider.setAttribute('x2', 365);
  divider.setAttribute('y2', startY + 8 + Math.min(seq.length, stepIdx + 2) * rowH);
  divider.setAttribute('stroke', '#222');
  divider.setAttribute('stroke-width', '1');
  divider.setAttribute('stroke-dasharray', '4,3');
  content.appendChild(divider);

  // Draw visible steps
  const maxVisible = 5;
  const visibleStart = Math.max(0, stepIdx - maxVisible + 1);

  for (let i = visibleStart; i < seq.length && i <= stepIdx; i++) {
    const step = seq[i];
    const vi = i - visibleStart;
    if (vi >= maxVisible) break;

    const y = startY + 16 + vi * rowH;
    const x = step.side === 'agent' ? agentX : harnessX;
    const isCurrent = i === stepIdx;

    // Step box
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', y);
    rect.setAttribute('width', boxW);
    rect.setAttribute('height', boxH);
    rect.setAttribute('rx', 2);

    if (step.type === 'error') {
      rect.setAttribute('fill', isCurrent ? '#1a0a0a' : 'none');
      rect.setAttribute('stroke', isCurrent ? '#e64a4a' : '#331a1a');
      rect.setAttribute('stroke-width', isCurrent ? '1.5' : '1');
    } else if (step.type === 'result') {
      rect.setAttribute('fill', isCurrent ? ACCENT_FILL : ACCENT_FILL_DARK);
      rect.setAttribute('stroke', isCurrent ? ACCENT : ACCENT_DIM);
      rect.setAttribute('stroke-width', isCurrent ? '1.5' : '1');
    } else {
      rect.setAttribute('fill', isCurrent ? ACCENT_FILL : 'none');
      rect.setAttribute('stroke', isCurrent ? ACCENT : '#222');
      rect.setAttribute('stroke-width', isCurrent ? '1.5' : '1');
    }
    content.appendChild(rect);

    // Tool/error label
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', x + 10);
    label.setAttribute('y', y + 16);
    label.setAttribute('font-size', '10');
    label.setAttribute('font-family', 'IBM Plex Mono');
    label.setAttribute('font-weight', '500');

    if (step.type === 'error') {
      label.setAttribute('fill', '#e64a4a');
    } else if (step.type === 'result') {
      label.setAttribute('fill', ACCENT);
    } else {
      label.setAttribute('fill', isCurrent ? ACCENT : ACCENT_MID);
    }
    label.textContent = step.label;
    content.appendChild(label);

    // Description
    const desc = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    desc.setAttribute('x', x + 10);
    desc.setAttribute('y', y + 32);
    desc.setAttribute('font-size', '8');
    desc.setAttribute('font-family', 'IBM Plex Mono');
    desc.setAttribute('fill', isCurrent ? '#888' : '#555');
    // Truncate if too long
    const maxChars = 42;
    desc.textContent = step.desc.length > maxChars ? step.desc.slice(0, maxChars) + '...' : step.desc;
    content.appendChild(desc);

    // Turn number
    const turnNum = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    turnNum.setAttribute('x', x + boxW - 8);
    turnNum.setAttribute('y', y + 12);
    turnNum.setAttribute('text-anchor', 'end');
    turnNum.setAttribute('font-size', '8');
    turnNum.setAttribute('font-family', 'IBM Plex Mono');
    turnNum.setAttribute('fill', '#333');
    turnNum.textContent = `#${i + 1}`;
    content.appendChild(turnNum);

    // Arrow to next
    if (vi < maxVisible - 1 && i < stepIdx) {
      const nextStep = seq[i + 1];
      if (nextStep) {
        const arrowFromX = step.side === 'agent' ? x + boxW : x;
        const arrowToX = nextStep.side === 'agent' ? agentX : harnessX;
        const arrowY1 = y + boxH;
        const arrowY2 = y + rowH;
        const midY = (arrowY1 + arrowY2) / 2;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const startAX = step.side === 'agent' ? x + boxW / 2 : x + boxW / 2;
        const endAX = nextStep.side === 'agent' ? agentX + boxW / 2 : harnessX + boxW / 2;
        path.setAttribute('d', `M ${startAX} ${arrowY1} L ${endAX} ${arrowY2}`);
        path.setAttribute('stroke', '#222');
        path.setAttribute('stroke-width', '1');
        path.setAttribute('fill', 'none');
        content.appendChild(path);
      }
    }
  }

  // Turns wasted calculation
  let turnsWasted = 0;
  if (mode === 'raw') {
    // In raw mode: retries and workarounds are wasted turns
    turnsWasted = Math.min(stepIdx + 1, seq.length) - (stepIdx >= seq.length - 1 ? 2 : 0);
    turnsWasted = Math.max(0, Math.min(stepIdx + 1, 7)); // 7 of 9 turns wasted
    if (stepIdx >= seq.length - 1) turnsWasted = 7;
  }

  // Status
  if (mode && stepIdx >= 0 && stepIdx < seq.length) {
    statusText.textContent = seq[stepIdx].desc;
    statusText.setAttribute('fill', seq[stepIdx].type === 'error' ? '#e64a4a' : seq[stepIdx].type === 'result' ? ACCENT : '#888');
  } else if (!mode) {
    statusText.textContent = 'choose an error mode, then step through';
    statusText.setAttribute('fill', '#888');
  }

  // Stats
  document.getElementById('stat-turns').textContent = Math.max(0, stepIdx + 1);
  document.getElementById('stat-wasted').textContent = turnsWasted;
  const resolvedEl = document.getElementById('stat-resolved');
  if (stepIdx >= 0 && stepIdx >= currentSequence().length - 1) {
    resolvedEl.textContent = 'yes';
    resolvedEl.style.color = ACCENT;
  } else {
    resolvedEl.textContent = '—';
    resolvedEl.style.color = '';
  }
  document.getElementById('mode-display').textContent = mode || 'none';
}

// 4. Event handlers
function setMode(m) {
  mode = m;
  stepIdx = -1;
  document.getElementById('btn-raw').classList.toggle('active', m === 'raw');
  document.getElementById('btn-instructive').classList.toggle('active', m === 'instructive');
  render();
}

function advanceStep() {
  if (!mode) return;
  const seq = currentSequence();
  if (stepIdx >= seq.length - 1) return;
  stepIdx++;
  render();
}

document.getElementById('btn-raw').addEventListener('click', () => setMode('raw'));
document.getElementById('btn-instructive').addEventListener('click', () => setMode('instructive'));
document.getElementById('btn-step').addEventListener('click', advanceStep);
document.getElementById('btn-reset').addEventListener('click', () => {
  if (mode) setMode(mode);
  else { stepIdx = -1; render(); }
});

// 5. Init
render();
</script>
</body>
</html>
