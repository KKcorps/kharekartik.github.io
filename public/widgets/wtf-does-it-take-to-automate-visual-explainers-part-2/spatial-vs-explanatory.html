<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatial vs Explanatory Correctness</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--w-accent); margin-bottom: 6px;
  }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  .mode-label { margin-left: auto; font-size: 11px; color: #666; }
  .mode-label span { color: var(--w-accent); }
  .stats {
    display: flex; gap: 24px; font-size: 11px; color: #666; margin-top: 14px;
  }
  .stats span { color: var(--w-accent); }
  .stats .bad { color: #e64a4a; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// spatial vs explanatory correctness</div>
  <div class="widget-subtitle">toggle between spatially correct and explanatorily correct to see the difference</div>

  <svg id="main-svg" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="scene"></g>
  </svg>

  <div class="controls">
    <button id="btn-spatial">spatially correct</button>
    <button id="btn-explanatory">explanatorily correct</button>
    <div class="mode-label">mode: <span id="mode-display">none</span></div>
  </div>
  <div class="stats">
    <div>layout audit: <span id="stat-layout">--</span></div>
    <div>comprehension: <span id="stat-comp">--</span></div>
  </div>
</div>
<script>
// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

const NS = 'http://www.w3.org/2000/svg';
const scene = document.getElementById('scene');

// ── Node data ──
const nodesSpatial = [
  { label: 'Segment Loom' },
  { label: 'Decode Gantry' },
  { label: 'Transform Crucible' },
  { label: 'Filter Cascade' },
  { label: 'Index Forge' },
];

const nodesExplanatory = [
  { label: 'Stream \u2192 Decode', sub: 'raw bytes to rows' },
  { label: 'Transform', sub: 'apply filters' },
  { label: 'Dedup Check', sub: 'drop duplicates' },
  { label: 'Upsert Merge', sub: 'insert or update' },
  { label: 'Index Write', sub: 'column indexes' },
];

// ── Layout constants ──
const nodeW = 110;
const nodeH = 55;
const startX = 38;
const gapX = 24;
const nodeY = 120;
const totalPipelineW = 5 * nodeW + 4 * gapX;

// ── State ──
let mode = null; // 'spatial' | 'explanatory'
let dotInterval = null;
let dots = [];

function nodeX(i) { return startX + i * (nodeW + gapX); }

function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function clearDots() {
  if (dotInterval) { clearInterval(dotInterval); dotInterval = null; }
  dots.forEach(d => d.el.remove());
  dots = [];
}

function render() {
  clearDots();
  scene.innerHTML = '';

  if (!mode) {
    // Empty state
    const t = el('text', { x: 360, y: 170, 'text-anchor': 'middle', fill: '#555', 'font-size': '12', 'font-family': 'IBM Plex Mono' });
    t.textContent = 'select a mode to compare';
    scene.appendChild(t);
    document.getElementById('stat-layout').textContent = '--';
    document.getElementById('stat-layout').className = '';
    document.getElementById('stat-comp').textContent = '--';
    document.getElementById('stat-comp').className = '';
    document.getElementById('mode-display').textContent = 'none';
    return;
  }

  const isSpatial = mode === 'spatial';
  const nodes = isSpatial ? nodesSpatial : nodesExplanatory;

  // ── Feedback quote (Mode A only) ──
  if (isSpatial) {
    const quote = el('text', {
      x: 360, y: 42, 'text-anchor': 'middle',
      fill: '#e64a4a', 'font-size': '13', 'font-family': 'IBM Plex Mono',
      'font-style': 'italic', opacity: '0.9'
    });
    quote.textContent = '"what am I looking at?"';
    scene.appendChild(quote);
    const quoteLabel = el('text', {
      x: 360, y: 58, 'text-anchor': 'middle',
      fill: '#553333', 'font-size': '9', 'font-family': 'IBM Plex Mono'
    });
    quoteLabel.textContent = '\u2014 every person who saw this diagram';
    scene.appendChild(quoteLabel);
  }

  // ── Mode B header annotation ──
  if (!isSpatial) {
    const header = el('text', {
      x: 360, y: 42, 'text-anchor': 'middle',
      fill: ACCENT, 'font-size': '13', 'font-family': 'IBM Plex Mono',
      opacity: '0.8'
    });
    header.textContent = 'same layout, clear semantics';
    scene.appendChild(header);
    const sub = el('text', {
      x: 360, y: 58, 'text-anchor': 'middle',
      fill: '#555', 'font-size': '9', 'font-family': 'IBM Plex Mono'
    });
    sub.textContent = 'labels describe what each stage actually does';
    scene.appendChild(sub);
  }

  // ── Direction arrow label ──
  const flowLabel = el('text', {
    x: startX, y: nodeY - 18,
    fill: isSpatial ? '#333' : '#555', 'font-size': '9', 'font-family': 'IBM Plex Mono'
  });
  flowLabel.textContent = 'data flow \u2192';
  scene.appendChild(flowLabel);

  // ── Connectors ──
  for (let i = 0; i < 4; i++) {
    const x1 = nodeX(i) + nodeW;
    const x2 = nodeX(i + 1);
    const cy = nodeY + nodeH / 2;
    const line = el('line', {
      x1, y1: cy, x2, y2: cy,
      stroke: isSpatial ? '#222' : ACCENT_DIM,
      'stroke-width': '1.5'
    });
    scene.appendChild(line);

    // Arrowhead
    const ah = el('polygon', {
      points: `${x2},${cy} ${x2 - 5},${cy - 3} ${x2 - 5},${cy + 3}`,
      fill: isSpatial ? '#222' : ACCENT_DIM
    });
    scene.appendChild(ah);
  }

  // ── Nodes ──
  for (let i = 0; i < 5; i++) {
    const nx = nodeX(i);
    const node = nodes[i];

    // Box
    const rect = el('rect', {
      x: nx, y: nodeY, width: nodeW, height: nodeH, rx: 3,
      fill: isSpatial ? '#111' : ACCENT_FILL,
      stroke: isSpatial ? '#333' : ACCENT,
      'stroke-width': isSpatial ? '1' : '1.5'
    });
    scene.appendChild(rect);

    // Label
    const labelY = node.sub ? nodeY + 22 : nodeY + 30;
    const label = el('text', {
      x: nx + nodeW / 2, y: labelY, 'text-anchor': 'middle',
      fill: isSpatial ? '#888' : '#e0e0e0',
      'font-size': '10', 'font-family': 'IBM Plex Mono',
      'font-weight': '500'
    });
    label.textContent = node.label;
    scene.appendChild(label);

    // Subtitle (Mode B only)
    if (node.sub) {
      const sub = el('text', {
        x: nx + nodeW / 2, y: nodeY + 38, 'text-anchor': 'middle',
        fill: '#666', 'font-size': '8', 'font-family': 'IBM Plex Mono'
      });
      sub.textContent = node.sub;
      scene.appendChild(sub);
    }

    // Node index (subtle)
    const idx = el('text', {
      x: nx + 6, y: nodeY + 12,
      fill: isSpatial ? '#222' : ACCENT_DIM,
      'font-size': '8', 'font-family': 'IBM Plex Mono'
    });
    idx.textContent = `${i + 1}`;
    scene.appendChild(idx);
  }

  // ── Audit panel ──
  const panelX = 502;
  const panelY = 225;
  const panelW = 206;
  const panelH = 100;

  const panelBg = el('rect', {
    x: panelX, y: panelY, width: panelW, height: panelH, rx: 3,
    fill: '#0d0d0d', stroke: '#222', 'stroke-width': '1'
  });
  scene.appendChild(panelBg);

  const panelTitle = el('text', {
    x: panelX + 10, y: panelY + 16,
    fill: '#555', 'font-size': '9', 'font-family': 'IBM Plex Mono', 'font-weight': '600'
  });
  panelTitle.textContent = 'LAYOUT AUDIT';
  scene.appendChild(panelTitle);

  const checks = [
    { text: 'no overlaps', pass: true },
    { text: 'labels readable', pass: true },
    { text: 'grid-aligned', pass: true },
    { text: 'contrast AA+', pass: true },
    { text: 'comprehension', pass: !isSpatial },
  ];

  checks.forEach((chk, ci) => {
    const cy = panelY + 30 + ci * 13;
    const icon = el('text', {
      x: panelX + 12, y: cy,
      fill: chk.pass ? ACCENT : '#e64a4a',
      'font-size': '9', 'font-family': 'IBM Plex Mono'
    });
    icon.textContent = chk.pass ? '\u2713' : '\u2717';
    scene.appendChild(icon);

    const txt = el('text', {
      x: panelX + 24, y: cy,
      fill: chk.pass ? '#888' : '#e64a4a',
      'font-size': '9', 'font-family': 'IBM Plex Mono'
    });
    txt.textContent = chk.text;
    scene.appendChild(txt);

    const status = el('text', {
      x: panelX + panelW - 12, y: cy, 'text-anchor': 'end',
      fill: chk.pass ? ACCENT : '#e64a4a',
      'font-size': '9', 'font-family': 'IBM Plex Mono', 'font-weight': '500'
    });
    status.textContent = chk.pass ? 'PASS' : 'FAIL';
    scene.appendChild(status);
  });

  // ── Status summary (bottom-left) ──
  const summX = 38;
  const summY = 246;

  const summBg = el('rect', {
    x: summX, y: summY - 18, width: 430, height: 78, rx: 3,
    fill: '#0d0d0d', stroke: '#222', 'stroke-width': '1'
  });
  scene.appendChild(summBg);

  if (isSpatial) {
    const s1 = el('text', {
      x: summX + 12, y: summY,
      fill: '#888', 'font-size': '10', 'font-family': 'IBM Plex Mono'
    });
    s1.textContent = 'every spatial check passes. pixel-perfect layout.';
    scene.appendChild(s1);

    const s2 = el('text', {
      x: summX + 12, y: summY + 16,
      fill: '#e64a4a', 'font-size': '10', 'font-family': 'IBM Plex Mono'
    });
    s2.textContent = 'but no one can tell what the system does.';
    scene.appendChild(s2);

    const s3 = el('text', {
      x: summX + 12, y: summY + 36,
      fill: '#555', 'font-size': '9', 'font-family': 'IBM Plex Mono'
    });
    s3.textContent = 'the layout engine optimized for geometry,';
    scene.appendChild(s3);

    const s4 = el('text', {
      x: summX + 12, y: summY + 49,
      fill: '#555', 'font-size': '9', 'font-family': 'IBM Plex Mono'
    });
    s4.textContent = 'not for understanding.';
    scene.appendChild(s4);
  } else {
    const s1 = el('text', {
      x: summX + 12, y: summY,
      fill: ACCENT, 'font-size': '10', 'font-family': 'IBM Plex Mono'
    });
    s1.textContent = 'same layout quality. same spatial checks.';
    scene.appendChild(s1);

    const s2 = el('text', {
      x: summX + 12, y: summY + 16,
      fill: '#e0e0e0', 'font-size': '10', 'font-family': 'IBM Plex Mono'
    });
    s2.textContent = 'now you can actually understand the pipeline.';
    scene.appendChild(s2);

    const s3 = el('text', {
      x: summX + 12, y: summY + 36,
      fill: '#555', 'font-size': '9', 'font-family': 'IBM Plex Mono'
    });
    s3.textContent = 'the difference is purely semantic \u2014 labels,';
    scene.appendChild(s3);

    const s4 = el('text', {
      x: summX + 12, y: summY + 49,
      fill: '#555', 'font-size': '9', 'font-family': 'IBM Plex Mono'
    });
    s4.textContent = 'subtitles, and data flow annotations.';
    scene.appendChild(s4);
  }

  // ── Animated dots (Mode B only) ──
  if (!isSpatial) {
    startDots();
  }

  // ── Stats bar ──
  document.getElementById('stat-layout').textContent = 'PASS \u2713';
  document.getElementById('stat-layout').className = '';
  if (isSpatial) {
    document.getElementById('stat-comp').textContent = 'FAIL \u2717';
    document.getElementById('stat-comp').className = 'bad';
  } else {
    document.getElementById('stat-comp').textContent = 'PASS \u2713';
    document.getElementById('stat-comp').className = '';
  }
  document.getElementById('mode-display').textContent = mode === 'spatial' ? 'spatially correct' : 'explanatorily correct';
}

// ── Dot animation ──
function startDots() {
  const cy = nodeY + nodeH / 2;

  dotInterval = setInterval(() => {
    // Spawn a dot on a random connector
    const seg = Math.floor(Math.random() * 4);
    const x1 = nodeX(seg) + nodeW + 2;
    const x2 = nodeX(seg + 1) - 2;

    const dot = el('circle', {
      cx: x1, cy: cy, r: 2.5,
      fill: ACCENT, opacity: '0.9'
    });
    scene.appendChild(dot);

    const dotObj = { el: dot, x: x1, targetX: x2, speed: 1.2 + Math.random() * 0.6 };
    dots.push(dotObj);
  }, 300);

  // Move dots via requestAnimationFrame
  function moveDots() {
    for (let i = dots.length - 1; i >= 0; i--) {
      const d = dots[i];
      d.x += d.speed;
      d.el.setAttribute('cx', d.x);

      // Fade as approaching target
      const progress = (d.x - (d.targetX - 22)) / 22;
      if (progress > 0) {
        d.el.setAttribute('opacity', Math.max(0, 1 - progress).toFixed(2));
      }

      if (d.x >= d.targetX) {
        d.el.remove();
        dots.splice(i, 1);
      }
    }
    if (dotInterval) requestAnimationFrame(moveDots);
  }
  requestAnimationFrame(moveDots);
}

// ── Controls ──
function setMode(m) {
  mode = m;
  document.getElementById('btn-spatial').classList.toggle('active', m === 'spatial');
  document.getElementById('btn-explanatory').classList.toggle('active', m === 'explanatory');
  render();
}

document.getElementById('btn-spatial').addEventListener('click', () => setMode('spatial'));
document.getElementById('btn-explanatory').addEventListener('click', () => setMode('explanatory'));

// ── Init ──
render();
</script>
</body>
</html>
