<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout Whack-a-Mole</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root { --w-accent: #c8e64a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .widget { width: 100%; max-width: 720px; }
  .widget-title {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--w-accent); margin-bottom: 6px;
  }
  .widget-subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
  svg { width: 100%; height: auto; display: block; }
  .controls {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  button {
    background: transparent; border: 1px solid #333; color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  button:hover { border-color: var(--w-accent); color: var(--w-accent); }
  button.active { border-color: var(--w-accent); color: #0a0a0a; background: var(--w-accent); }
  .mode-label { margin-left: auto; font-size: 11px; color: #666; }
  .mode-label span { color: var(--w-accent); }
  .stats {
    display: flex; gap: 24px; font-size: 11px; color: #666; margin-top: 14px;
  }
  .stats span { color: var(--w-accent); }
  .stats .bad { color: #e64a4a; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">// layout whack-a-mole</div>
  <div class="widget-subtitle">toggle between freehand and grid-snapped placement — step through to see the difference</div>

  <svg id="main-svg" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="canvas-clip">
        <rect x="60" y="20" width="600" height="250" rx="3"/>
      </clipPath>
    </defs>
    <g id="content"></g>
    <rect x="40" y="285" width="640" height="45" rx="3" fill="none" stroke="#222" stroke-width="1"/>
    <text x="360" y="312" text-anchor="middle" fill="#888" font-size="11"
          font-family="IBM Plex Mono" id="status-text">choose a mode, then step through</text>
  </svg>

  <div class="controls">
    <button id="btn-freehand">freehand</button>
    <button id="btn-grid">grid-snapped</button>
    <button id="btn-step">next step &rarr;</button>
    <button id="btn-reset">reset</button>
    <div class="mode-label">mode: <span id="mode-display">none</span></div>
  </div>
  <div class="stats">
    <div>step: <span id="stat-step">0</span></div>
    <div>overlaps: <span class="bad" id="stat-overlaps">0</span></div>
  </div>
</div>
<script>
// ── Sync accent with the blog's dynamic palette ──
const ACCENT = (() => {
  try {
    const p = JSON.parse(localStorage.getItem('home-accent-palette'));
    return p?.dark?.hex || '#c8e64a';
  } catch { return '#c8e64a'; }
})();
function _hexRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function _mix(rgb, t) {
  return '#' + rgb.map(c => Math.round(10 + (c - 10) * t).toString(16).padStart(2, '0')).join('');
}
const _ac = _hexRgb(ACCENT);
const ACCENT_DIM = _mix(_ac, 0.16);
const ACCENT_MID = _mix(_ac, 0.50);
const ACCENT_SOFT = _mix(_ac, 0.30);
const ACCENT_FILL = _mix(_ac, 0.08);
const ACCENT_FILL_DARK = _mix(_ac, 0.04);
const ACCENT_FAINT = _mix(_ac, 0.10);
document.documentElement.style.setProperty('--w-accent', ACCENT);

// ── Canvas dimensions ──
const CX = 60, CY = 20, CW = 600, CH = 250;
const NW = 100, NH = 50;

// ── Node definitions ──
const nodeLabels = ['Sprite A', 'Sprite B', 'Sprite C', 'HUD Bar', 'Score', 'Timer'];

// ── Freehand states: each step is an array of 6 {x,y} positions ──
// Overlaps are pairs of node indices that overlap at each step
// Node size: 100w x 50h. Canvas: x=60..660, y=20..270
// Overlap = rects share area (x ranges and y ranges both intersect)
const freehandSteps = [
  {
    // Step 0: initial layout — 2 overlap pairs
    // A(80,40) right=180; B(140,55) left=140 < 180, top=55 < 90 => overlap
    // D(350,150) right=450; E(400,160) left=400 < 450, top=160 < 200 => overlap
    pos: [
      { x: 80,  y: 40 },   // A
      { x: 140, y: 55 },   // B — overlaps A
      { x: 300, y: 38 },   // C — safe
      { x: 350, y: 150 },  // D (HUD Bar)
      { x: 400, y: 160 },  // E (Score) — overlaps D
      { x: 540, y: 95 },   // F (Timer) — safe
    ],
    overlaps: [[0,1],[3,4]],
    status: 'layout audit: 2 overlaps detected',
    desc: 'initial placement'
  },
  {
    // Step 1: agent nudges A right to clear B. A(210,40) right=310.
    // But C is at (300,38) left=300 < 310, top=38 < 90 => A overlaps C!
    // A no longer overlaps B: A(210,40) B(140,55) — A left=210 > B right=240? No:
    //   B right = 140+100 = 240 > A left 210. B bottom = 55+50=105 > A top 40. Still overlap!
    // Fix: move B down so it doesn't overlap A anymore.
    // A(210,40): bottom=90. B(140,95): top=95 > 90 => no overlap. Good.
    pos: [
      { x: 210, y: 40 },   // A nudged right +130px
      { x: 140, y: 95 },   // B shifted down (agent adjusts)
      { x: 300, y: 38 },   // C — now A right=310 > C left=300 => overlap!
      { x: 350, y: 150 },  // D
      { x: 400, y: 160 },  // E
      { x: 540, y: 95 },   // F
    ],
    overlaps: [[0,2],[3,4]],
    status: 'fixed 1 overlap, created 1 new collision',
    desc: 'nudge A right +130px'
  },
  {
    // Step 2: agent nudges C down to avoid A. C(300,110) bottom=160.
    // D is at (350,150) top=150 < C bottom=160, D left=350 < C right=400 => C overlaps D!
    // D+E still overlap (unchanged).
    pos: [
      { x: 210, y: 40 },   // A
      { x: 140, y: 95 },   // B
      { x: 300, y: 110 },  // C nudged down +72px — now overlaps D
      { x: 350, y: 150 },  // D — C right=400 > D left=350, C bot=160 > D top=150
      { x: 400, y: 160 },  // E
      { x: 540, y: 95 },   // F
    ],
    overlaps: [[2,3],[3,4]],
    status: 'fixed 1 collision, created 1 new overlap',
    desc: 'nudge C down +72px'
  },
  {
    // Step 3: agent nudges D left to clear C and E.
    // D(20,150) — left edge 20, canvas starts at 60 => clipped!
    // D no longer overlaps C or E (too far left).
    pos: [
      { x: 210, y: 40 },   // A
      { x: 140, y: 95 },   // B
      { x: 300, y: 110 },  // C
      { x: 20,  y: 150 },  // D nudged left -330px — clipped off-canvas!
      { x: 400, y: 160 },  // E
      { x: 540, y: 95 },   // F
    ],
    overlaps: [],
    clipped: [3],
    status: 'fixed overlap, node D clipped off-canvas',
    desc: 'nudge D left -330px'
  },
  {
    // Step 4: agent nudges D back right. D(370,160) right=470.
    // E at (400,160) left=400 < 470 => D overlaps E again!
    // Also B(140,95) bottom=145, C(300,110): no overlap (140+100=240 vs 300). Good.
    pos: [
      { x: 210, y: 40 },   // A
      { x: 140, y: 95 },   // B
      { x: 300, y: 110 },  // C
      { x: 370, y: 160 },  // D nudged back right — overlaps E
      { x: 400, y: 160 },  // E — D right=470 > E left=400, same Y
      { x: 540, y: 95 },   // F
    ],
    overlaps: [[3,4]],
    status: '5 steps, 1 overlap remaining \u2014 whack-a-mole',
    desc: 'nudge D right +350px'
  },
];

// ── Grid-snapped states ──
const GRID = 16;
const gridCols = 3, gridRows = 2;
const gridCellW = Math.floor(CW / gridCols);
const gridCellH = Math.floor(CH / gridRows);

function gridPos(col, row) {
  return {
    x: CX + col * gridCellW + (gridCellW - NW) / 2,
    y: CY + row * gridCellH + (gridCellH - NH) / 2
  };
}

const gridFinalPos = [
  gridPos(0, 0), gridPos(1, 0), gridPos(2, 0),
  gridPos(0, 1), gridPos(1, 1), gridPos(2, 1),
];

const gridSteps = [
  {
    phase: 'compute',
    status: 'grid computed: 3 cols x 2 rows',
    desc: 'compute grid',
    showGrid: true,
    showNodes: false,
    showLanes: false,
  },
  {
    phase: 'place',
    status: 'nodes placed at grid centers',
    desc: 'place nodes',
    showGrid: true,
    showNodes: true,
    showLanes: false,
  },
  {
    phase: 'lanes',
    status: 'labels placed in reserved lanes',
    desc: 'label lanes',
    showGrid: true,
    showNodes: true,
    showLanes: true,
  },
  {
    phase: 'done',
    status: 'all clear \u2014 0 overlaps, 0 steps wasted',
    desc: 'verify',
    showGrid: true,
    showNodes: true,
    showLanes: true,
  },
];

// ── State ──
let mode = null; // 'freehand' | 'grid'
let stepIdx = -1;

// ── DOM refs ──
const content = document.getElementById('content');
const statusText = document.getElementById('status-text');

// ── SVG helpers ──
const SVG_NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs, textContent) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (textContent != null) e.textContent = textContent;
  return e;
}

// ── Check if two rects overlap ──
function rectsOverlap(a, b) {
  return a.x < b.x + NW && a.x + NW > b.x && a.y < b.y + NH && a.y + NH > b.y;
}

// ── Compute overlap rectangle ──
function overlapRect(a, b) {
  const x = Math.max(a.x, b.x);
  const y = Math.max(a.y, b.y);
  const x2 = Math.min(a.x + NW, b.x + NW);
  const y2 = Math.min(a.y + NH, b.y + NH);
  if (x2 <= x || y2 <= y) return null;
  return { x, y, w: x2 - x, h: y2 - y };
}

// ── Render ──
function render() {
  content.innerHTML = '';

  if (mode === 'freehand') renderFreehand();
  else if (mode === 'grid') renderGrid();
  else renderEmpty();

  // Update stats
  const overlaps = getCurrentOverlapCount();
  document.getElementById('stat-step').textContent = Math.max(0, stepIdx + 1);
  const olEl = document.getElementById('stat-overlaps');
  olEl.textContent = overlaps;
  olEl.className = overlaps > 0 ? 'bad' : '';
  if (overlaps === 0 && stepIdx >= 0) olEl.style.color = ACCENT;
  else olEl.style.color = '';

  document.getElementById('mode-display').textContent = mode || 'none';
}

function getCurrentOverlapCount() {
  if (mode === 'freehand' && stepIdx >= 0 && stepIdx < freehandSteps.length) {
    return freehandSteps[stepIdx].overlaps.length + (freehandSteps[stepIdx].clipped ? freehandSteps[stepIdx].clipped.length : 0);
  }
  return 0;
}

function renderEmpty() {
  // Draw empty canvas outline
  content.appendChild(el('rect', {
    x: CX, y: CY, width: CW, height: CH, rx: 3,
    fill: 'none', stroke: '#222', 'stroke-width': 1
  }));
  content.appendChild(el('text', {
    x: CX + CW / 2, y: CY + CH / 2 + 4,
    'text-anchor': 'middle', fill: '#333',
    'font-size': 12, 'font-family': 'IBM Plex Mono'
  }, 'select a mode to begin'));
  statusText.textContent = 'choose a mode, then step through';
  statusText.setAttribute('fill', '#888');
}

// ── Freehand mode rendering ──
function renderFreehand() {
  const step = stepIdx >= 0 ? freehandSteps[Math.min(stepIdx, freehandSteps.length - 1)] : null;
  const positions = step ? step.pos : freehandSteps[0].pos;
  const overlaps = step ? step.overlaps : [];
  const clipped = step ? (step.clipped || []) : [];

  // Canvas border
  content.appendChild(el('rect', {
    x: CX, y: CY, width: CW, height: CH, rx: 3,
    fill: '#0e0e0e', stroke: '#222', 'stroke-width': 1
  }));

  // Canvas label
  content.appendChild(el('text', {
    x: CX + 8, y: CY + 14,
    fill: '#333', 'font-size': 8, 'font-family': 'IBM Plex Mono'
  }, 'CANVAS 600x250'));

  // Clipping group for nodes
  const clipGroup = el('g', { 'clip-path': 'url(#canvas-clip)' });

  // Build set of overlapping node indices
  const overlappingNodes = new Set();
  overlaps.forEach(([a, b]) => { overlappingNodes.add(a); overlappingNodes.add(b); });

  // Draw overlap highlight regions
  overlaps.forEach(([ai, bi]) => {
    const oRect = overlapRect(positions[ai], positions[bi]);
    if (oRect) {
      clipGroup.appendChild(el('rect', {
        x: oRect.x, y: oRect.y, width: oRect.w, height: oRect.h, rx: 2,
        fill: 'rgba(230, 74, 74, 0.08)',
        stroke: '#e64a4a', 'stroke-width': 1.5,
        'stroke-dasharray': '4,3'
      }));
    }
  });

  // Draw nodes
  positions.forEach((pos, i) => {
    const isOverlapping = overlappingNodes.has(i);
    const isClipped = clipped.includes(i);
    const strokeColor = isOverlapping ? '#e64a4a' : isClipped ? '#e6a64a' : '#333';
    const strokeDash = isOverlapping ? '4,3' : 'none';
    const fillColor = isOverlapping ? 'rgba(230, 74, 74, 0.04)' : isClipped ? 'rgba(230, 166, 74, 0.04)' : '#111';

    // Node rectangle
    clipGroup.appendChild(el('rect', {
      x: pos.x, y: pos.y, width: NW, height: NH, rx: 3,
      fill: fillColor, stroke: strokeColor, 'stroke-width': 1.5,
      'stroke-dasharray': strokeDash
    }));

    // Node label
    clipGroup.appendChild(el('text', {
      x: pos.x + NW / 2, y: pos.y + NH / 2 + 4,
      'text-anchor': 'middle', fill: isOverlapping ? '#e64a4a' : isClipped ? '#e6a64a' : '#888',
      'font-size': 10, 'font-family': 'IBM Plex Mono'
    }, nodeLabels[i]));
  });

  content.appendChild(clipGroup);

  // Draw out-of-bounds indicator for clipped nodes
  clipped.forEach(ci => {
    const pos = positions[ci];
    if (pos.x < CX) {
      // Draw a warning indicator at the left edge
      content.appendChild(el('line', {
        x1: CX, y1: pos.y, x2: CX, y2: pos.y + NH,
        stroke: '#e6a64a', 'stroke-width': 2, 'stroke-dasharray': '3,2'
      }));
      content.appendChild(el('text', {
        x: CX + 4, y: pos.y + NH / 2 + 3,
        fill: '#e6a64a', 'font-size': 8, 'font-family': 'IBM Plex Mono'
      }, '\u2190 clipped'));
    }
  });

  // Step description annotation
  if (step && stepIdx > 0) {
    content.appendChild(el('text', {
      x: CX + CW - 8, y: CY + 14,
      'text-anchor': 'end', fill: '#444',
      'font-size': 8, 'font-family': 'IBM Plex Mono'
    }, 'step ' + (stepIdx + 1) + ': ' + step.desc));
  }

  // Status text
  if (step) {
    statusText.textContent = step.status;
    const hasProblems = step.overlaps.length > 0 || (step.clipped && step.clipped.length > 0);
    statusText.setAttribute('fill', hasProblems ? '#e64a4a' : '#888');
  } else {
    statusText.textContent = 'freehand mode — step through to watch the agent struggle';
    statusText.setAttribute('fill', '#888');
  }
}

// ── Grid mode rendering ──
function renderGrid() {
  const step = stepIdx >= 0 ? gridSteps[Math.min(stepIdx, gridSteps.length - 1)] : null;

  // Canvas border
  content.appendChild(el('rect', {
    x: CX, y: CY, width: CW, height: CH, rx: 3,
    fill: '#0e0e0e', stroke: ACCENT_DIM, 'stroke-width': 1
  }));

  // Canvas label
  content.appendChild(el('text', {
    x: CX + 8, y: CY + 14,
    fill: '#333', 'font-size': 8, 'font-family': 'IBM Plex Mono'
  }, 'CANVAS 600x250 \u2014 16px GRID'));

  const showGrid = step ? step.showGrid : false;
  const showNodes = step ? step.showNodes : false;
  const showLanes = step ? step.showLanes : false;
  const isDone = step && step.phase === 'done';

  // Draw grid lines
  if (showGrid) {
    // Vertical grid lines (16px)
    for (let x = CX; x <= CX + CW; x += GRID) {
      content.appendChild(el('line', {
        x1: x, y1: CY, x2: x, y2: CY + CH,
        stroke: '#222', 'stroke-width': 0.5, opacity: 0.3
      }));
    }
    // Horizontal grid lines (16px)
    for (let y = CY; y <= CY + CH; y += GRID) {
      content.appendChild(el('line', {
        x1: CX, y1: y, x2: CX + CW, y2: y,
        stroke: '#222', 'stroke-width': 0.5, opacity: 0.3
      }));
    }

    // Column dividers (heavier)
    for (let c = 1; c < gridCols; c++) {
      const x = CX + c * gridCellW;
      content.appendChild(el('line', {
        x1: x, y1: CY, x2: x, y2: CY + CH,
        stroke: ACCENT_DIM, 'stroke-width': 1, 'stroke-dasharray': '6,4'
      }));
    }
    // Row divider (heavier)
    for (let r = 1; r < gridRows; r++) {
      const y = CY + r * gridCellH;
      content.appendChild(el('line', {
        x1: CX, y1: y, x2: CX + CW, y2: y,
        stroke: ACCENT_DIM, 'stroke-width': 1, 'stroke-dasharray': '6,4'
      }));
    }

    // Grid cell labels
    if (!showNodes) {
      for (let r = 0; r < gridRows; r++) {
        for (let c = 0; c < gridCols; c++) {
          const cx = CX + c * gridCellW + gridCellW / 2;
          const cy = CY + r * gridCellH + gridCellH / 2;
          content.appendChild(el('text', {
            x: cx, y: cy + 3, 'text-anchor': 'middle',
            fill: ACCENT_DIM, 'font-size': 9, 'font-family': 'IBM Plex Mono'
          }, `[${c},${r}]`));
        }
      }
    }
  }

  // Draw label lanes
  if (showLanes) {
    for (let r = 0; r < gridRows; r++) {
      // Lane sits below the node center area
      const laneY = CY + r * gridCellH + (gridCellH - NH) / 2 + NH - 4;
      const laneH = 16;
      content.appendChild(el('rect', {
        x: CX + 2, y: laneY, width: CW - 4, height: laneH, rx: 2,
        fill: ACCENT_FILL_DARK, stroke: 'none'
      }));
      content.appendChild(el('text', {
        x: CX + CW - 6, y: laneY + 11,
        'text-anchor': 'end', fill: ACCENT_DIM,
        'font-size': 7, 'font-family': 'IBM Plex Mono'
      }, 'LABEL LANE ' + (r + 1)));
    }
  }

  // Draw nodes at grid positions
  if (showNodes) {
    gridFinalPos.forEach((pos, i) => {
      const strokeColor = isDone ? ACCENT : ACCENT_MID;
      const fillColor = isDone ? ACCENT_FILL : ACCENT_FILL_DARK;

      // Node rectangle
      content.appendChild(el('rect', {
        x: pos.x, y: pos.y, width: NW, height: NH, rx: 3,
        fill: fillColor, stroke: strokeColor, 'stroke-width': 1.5
      }));

      // Node label
      content.appendChild(el('text', {
        x: pos.x + NW / 2, y: pos.y + NH / 2 + 4,
        'text-anchor': 'middle', fill: isDone ? ACCENT : ACCENT_MID,
        'font-size': 10, 'font-family': 'IBM Plex Mono'
      }, nodeLabels[i]));
    });
  }

  // Step annotation
  if (step) {
    content.appendChild(el('text', {
      x: CX + CW - 8, y: CY + 14,
      'text-anchor': 'end', fill: ACCENT_DIM,
      'font-size': 8, 'font-family': 'IBM Plex Mono'
    }, 'step ' + (stepIdx + 1) + ': ' + step.desc));
  }

  // Status text
  if (step) {
    statusText.textContent = step.status;
    statusText.setAttribute('fill', isDone ? ACCENT : '#888');
  } else {
    statusText.textContent = 'grid-snapped mode — step through to see clean placement';
    statusText.setAttribute('fill', '#888');
  }
}

// ── Event handlers ──
function setMode(m) {
  mode = m;
  stepIdx = -1;
  document.getElementById('btn-freehand').classList.toggle('active', m === 'freehand');
  document.getElementById('btn-grid').classList.toggle('active', m === 'grid');
  render();
}

function advanceStep() {
  if (!mode) return;
  const maxSteps = mode === 'freehand' ? freehandSteps.length : gridSteps.length;
  if (stepIdx >= maxSteps - 1) return;
  stepIdx++;
  render();
}

document.getElementById('btn-freehand').addEventListener('click', () => setMode('freehand'));
document.getElementById('btn-grid').addEventListener('click', () => setMode('grid'));
document.getElementById('btn-step').addEventListener('click', advanceStep);
document.getElementById('btn-reset').addEventListener('click', () => {
  if (mode) setMode(mode);
  else { stepIdx = -1; render(); }
});

// ── Init ──
render();
</script>
</body>
</html>
